<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* 上部 */
.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

/* タブ */
.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

/* コンテンツ */
.content {
  margin-top: 15px;
}

/* グリッド */
.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

/* サムネ */
.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 8px;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* タイトル */
.title {
  margin-top: 4px;
  font-size: 11px;
  line-height: 1.3;
}

.title a {
  text-decoration: none;
  color: #222;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* 戻る */
.back {
  display: inline-block;
  margin-top: 20px;
  font-size: 13px;
  color: #666;
  text-decoration: none;
}
</style>

</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <div class="tab" onclick="showTab(event, 'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
    <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

  <a href="index.html" class="back">← Back</a>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";

/* -------------------------
   状態保存
------------------------- */
function saveTab(type) {
  localStorage.setItem("lastTab", type);
}

function getSavedTab() {
  return localStorage.getItem("lastTab") || "goods";
}

/* -------------------------
   データ
------------------------- */
const data = {
  goods: ["誕生日グッズ2024", "アクリルスタンド"],
  song: ["歌枠まとめ", "アニソン歌枠"],
  news: ["新衣装発表", "ライブ出演"]
};

/* -------------------------
   タブ切り替え
------------------------- */
function showTab(event, type) {

  saveTab(type);

  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.remove("active");
  });

  if (event && event.target) {
    event.target.classList.add("active");
  }

  if (type === "archive") {
    loadArchive();
    return;
  }

  const list = data[type] || [];

  document.getElementById("content").innerHTML =
    "<ul>" + list.map(item => `<li>${item}</li>`).join("") + "</ul>";
}

/* -------------------------
   YouTube直RSS（安定版）
------------------------- */
async function loadArchive() {

  const res = await fetch(
    "https://www.youtube.com/feeds/videos.xml?channel_id=" + CHANNEL_ID
  );

  const text = await res.text();

  const parser = new DOMParser();
  const xml = parser.parseFromString(text, "text/xml");

  const entries = [...xml.querySelectorAll("entry")];

  const videos = entries.slice(0, 6).map(entry => {

    const title = entry.querySelector("title")?.textContent;
    const link = entry.querySelector("link")?.getAttribute("href");

    const id = link.split("v=")[1];

    return `
      <div>
        <div class="thumb">
          <img src="https://i.ytimg.com/vi/${id}/hqdefault.jpg">
        </div>
        <div class="title">
          <a href="${link}" target="_blank">${title}</a>
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("content").innerHTML =
    `<div class="video-grid">${videos}</div>`;
}

/* -------------------------
   初期表示（復元）
------------------------- */
function init() {
  const saved = getSavedTab();

  const fakeEvent = { target: document.querySelector(".tab") };

  showTab(fakeEvent, saved);
}

/* -------------------------
   起動
------------------------- */
init();

</script>

</body>
</html>
