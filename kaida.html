<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>アーカイブ</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  margin: 0;
  padding: 0;
}

/* ===== UI ===== */
.header {
  text-align: center;
  padding: 20px;
  background: white;
}

.header img {
  width: 80px;
  height: 80px;
  border-radius: 16px;
}

.desc {
  font-size: 12px;
  color: #666;
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  background: white;
  padding: 10px;
  border-top: 1px solid #eee;
}

.tab {
  padding: 6px 12px;
  background: #eee;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  padding: 20px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="header">
  <img src="images/kaida.png">
  <div class="desc">(グッズ)(アーカイブ)(歌枠)(お知らせ)</div>
</div>

<div class="tabs">
  <div class="tab" data-tab="archive">アーカイブ</div>
  <div class="tab" data-tab="goods">グッズ</div>
  <div class="tab" data-tab="live">歌枠</div>
  <div class="tab" data-tab="info">お知らせ</div>
</div>

<div class="content" id="content">loading...</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

/* ===== 保存 ===== */
function setTab(tab) {
  localStorage.setItem("activeTab", tab);
  loadTab(tab);
}

/* ===== 復元 ===== */
window.addEventListener("load", () => {
  const tab = localStorage.getItem("activeTab") || "archive";
  loadTab(tab);
});

/* ===== 秒変換 ===== */
function parseDuration(d) {
  if (!d) return 0;
  const m = d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (Number(m[1] || 0) * 60) + Number(m[2] || 0);
}

/* ===== Shorts ===== */
function isShort(v) {
  return parseDuration(v.contentDetails?.duration) <= 60;
}

/* ===== Live（安定版） ===== */
function isLive(v) {
  const title = (v.snippet?.title || "").toLowerCase();
  const sec = parseDuration(v.contentDetails?.duration);

  return (
    title.includes("配信") ||
    title.includes("ライブ") ||
    title.includes("live") ||
    title.includes("歌枠") ||
    title.includes("雑談") ||
    sec >= 3600
  );
}

/* ===== タブ切替 ===== */
function loadTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add("active");

  if (tab === "archive") loadArchive();
}

/* ===== アーカイブ ===== */
async function loadArchive() {

  const el = document.getElementById("content");
  el.innerHTML = "loading...";

  const ch = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
  ).then(r => r.json());

  const uploads = ch?.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;

  const pl = await fetch(
    `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`
  ).then(r => r.json());

  const ids = (pl.items || [])
    .map(v => v?.snippet?.resourceId?.videoId)
    .filter(Boolean)
    .join(",");

  const vd = await fetch(
    `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${ids}&key=${API_KEY}`
  ).then(r => r.json());

  const videos = vd.items || [];

  const g = {
    live: [],
    uta: [],
    original: [],
    clip: [],
    shorts: []
  };

  const html = (v) => {
    const id = v.id;
    return `
      <div>
        <img src="https://i.ytimg.com/vi/${id}/hqdefault.jpg">
      </div>
    `;
  };

  videos.forEach(v => {

    const title = (v.snippet?.title || "").toLowerCase();
    const card = html(v);

    if (isShort(v)) return g.shorts.push(card);
    if (isLive(v)) return g.live.push(card);

    if (title.includes("切り抜き")) return g.clip.push(card);
    if (title.includes("歌ってみた")) return g.uta.push(card);

    if (
      title.includes("オリジナル") ||
      title.includes("mv") ||
      title.includes("試聴")
    ) return g.original.push(card);

    return g.original.push(card);
  });

  el.innerHTML = `
    <h3>ライブ</h3><div class="video-grid">${g.live.join("")}</div>
    <h3>歌ってみた</h3><div class="video-grid">${g.uta.join("")}</div>
    <h3>オリ曲 / 試聴</h3><div class="video-grid">${g.original.join("")}</div>
    <h3>切り抜き</h3><div class="video-grid">${g.clip.join("")}</div>
    <h3>ショート</h3><div class="video-grid">${g.shorts.join("")}</div>
  `;
}

</script>

</body>
</html>
