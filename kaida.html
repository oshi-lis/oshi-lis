<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

.icon {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.tab.active {
  background: #222;
  color: #fff;
}

.content {
  margin-top: 15px;
}

.section {
  margin-bottom: 25px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  border-radius: 8px;
}

.thumb a {
  text-decoration: none;
  color: #222;
  font-size: 12px;
}

.pagination {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  justify-content: center;
  font-size: 12px;
}

.page-btn {
  padding: 4px 8px;
  background: #eee;
  border-radius: 6px;
  cursor: pointer;
}

.page-btn.active {
  background: #222;
  color: #fff;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png" class="icon">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="showTab(event,'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event,'song')">歌枠</div>
    <div class="tab" onclick="showTab(event,'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event,'news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

const perPage = 6;

/* ===== 固定タブ ===== */
const data = {
  goods: ["誕生日グッズ2024","アクリルスタンド"],
  song: ["アニソン縛り歌枠","深夜歌枠"],
  news: ["新衣装発表","ライブ出演"]
};

/* ===== アーカイブ状態 ===== */
let videos = {
  live:[],
  song:[],
  original:[],
  clip:[],
  short:[]
};

let pageState = {
  live:1,
  song:1,
  original:1,
  clip:1,
  short:1
};

/* ===== タブ ===== */
function showTab(e,type){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  e.target.classList.add("active");

  const el = document.getElementById("content");

  if(type === "archive"){
    loadArchive();
    return;
  }

  el.innerHTML =
    "<ul>" +
    (data[type]||[]).map(v=>`<li>${v}</li>`).join("") +
    "</ul>";
}

/* ===== duration ===== */
function parseDuration(d){
  if(!d) return 0;
  const h=d.match(/(\d+)H/);
  const m=d.match(/(\d+)M/);
  const s=d.match(/(\d+)S/);
  return (Number(h?.[1]||0)*3600)+(Number(m?.[1]||0)*60)+Number(s?.[1]||0);
}

/* ===== fetch ===== */
async function getAllVideos(limit=100){

  const ch = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
  ).then(r=>r.json());

  const uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

  let all=[];
  let token="";

  while(true){

    let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`;
    if(token) url += `&pageToken=${token}`;

    const res = await fetch(url).then(r=>r.json());

    all = all.concat(res.items||[]);

    if(all.length>=limit) break;
    if(!res.nextPageToken) break;

    token=res.nextPageToken;
  }

  return all;
}

async function getDetails(ids){

  let all=[];

  for(let i=0;i<ids.length;i+=50){
    const chunk = ids.slice(i,i+50);

    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${chunk.join(",")}&key=${API_KEY}`
    ).then(r=>r.json());

    all = all.concat(res.items||[]);
  }

  return all;
}

/* ===== 分類 ===== */
function classify(videosRaw){

  const g = {
    live:[],
    song:[],
    original:[],
    clip:[],
    short:[]
  };

  videosRaw.forEach(v=>{
    const title = v.snippet.title || "";
    const sec = parseDuration(v.contentDetails.duration);

    if(title.includes("切り抜き")) return g.clip.push(v);
    if(title.includes("オリジナル") || title.includes("試聴")) return g.original.push(v);
    if(title.includes("歌ってみた")) return g.song.push(v);
    if(title.includes("配信") || title.includes("雑談") || sec >= 1800) return g.live.push(v);
    if(sec > 0 && sec <= 60) return g.short.push(v);
  });

  return g;
}

/* ===== アーカイブ読み込み ===== */
async function loadArchive(){

  const el = document.getElementById("content");
  el.innerHTML = "loading...";

  const list = await getAllVideos(100);
  const ids = list.map(v=>v.snippet.resourceId.videoId);
  const details = await getDetails(ids);

  videos = classify(details);

  renderArchive();
}

/* ===== 描画 ===== */
function renderSection(key,title){

  const list = videos[key];
  const page = pageState[key];

  const start = (page-1)*perPage;
  const items = list.slice(start,start+perPage);

  const total = Math.ceil(list.length/perPage);

  return `
    <div class="section">
      <h3>${title}</h3>

      <div class="video-grid">
        ${items.map(v=>`
          <div class="thumb">
            <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank">
              <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
              <div>${v.snippet.title}</div>
            </a>
          </div>
        `).join("")}
      </div>

      <div class="pagination">
        ${Array.from({length:total},(_,i)=>`
          <div class="page-btn ${i+1===page?'active':''}"
               onclick="changePage('${key}',${i+1})">${i+1}</div>
        `).join("")}
      </div>
    </div>
  `;
}

/* ===== 全体描画 ===== */
function renderArchive(){

  const el = document.getElementById("content");

  el.innerHTML = `
    ${renderSection("live","配信アーカイブ")}
    ${renderSection("song","歌ってみた")}
    ${renderSection("original","オリ曲 / 試聴")}
    ${renderSection("clip","切り抜き")}
    ${renderSection("short","ショート")}
  `;
}

/* ===== ページ変更 ===== */
function changePage(key,page){
  pageState[key] = page;
  renderArchive();
}

/* ===== 初期 ===== */
const saved = "goods";
const target = document.querySelector(".tab");
showTab({target}, saved);

</script>

</body>
</html>
