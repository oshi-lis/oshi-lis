<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 8px;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title {
  margin-top: 4px;
  font-size: 11px;
  line-height: 1.3;
}

.title a {
  text-decoration: none;
  color: #222;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* デバッグ表示 */
.debug {
  font-size: 10px;
  color: #888;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="setTab('goods')">グッズ</div>
    <div class="tab" onclick="setTab('song')">歌枠</div>
    <div class="tab" onclick="setTab('archive')">アーカイブ</div>
    <div class="tab" onclick="setTab('news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";

const data = {
  goods: ["誕生日グッズ2024", "アクリルスタンド"],
  song: ["歌枠まとめ", "アニソン歌枠"],
  news: ["新衣装発表", "ライブ出演"]
};

let currentTab = "goods";

/* =========================
   状態保存
========================= */
function saveTab(tab) {
  localStorage.setItem("lastTab", tab);
}

function loadTab() {
  return localStorage.getItem("lastTab") || "goods";
}

/* =========================
   タブ制御（ここだけで管理）
========================= */
function setTab(tab) {
  currentTab = tab;
  saveTab(tab);
  render();
}

/* =========================
   描画（状態→UI）
========================= */
function render() {

  document.querySelectorAll(".tab").forEach((t, i) => {
    const map = ["goods", "song", "archive", "news"];
    t.classList.toggle("active", map[i] === currentTab);
  });

  if (currentTab === "archive") {
    loadArchive();
    return;
  }

  const list = data[currentTab] || [];

  document.getElementById("content").innerHTML =
    "<ul>" + list.map(v => `<li>${v}</li>`).join("") + "</ul>";
}

/* =========================
   アーカイブ（安定＋テスト付き）
========================= */
async function loadArchive() {

  document.getElementById("content").innerHTML = "読み込み中...";

  try {

    const res = await fetch(
      "https://www.youtube.com/feeds/videos.xml?channel_id=" + CHANNEL_ID
    );

    const text = await res.text();

    // 🔍 ここでまず中身チェック
    if (!text.includes("<entry")) {
      throw new Error("RSSじゃないデータが返ってきてる");
    }

    const xml = new DOMParser().parseFromString(text, "text/xml");

    const entries = [...xml.querySelectorAll("entry")];

    if (entries.length === 0) {
      throw new Error("entryが0件（解析失敗）");
    }

    const videos = entries.slice(0, 6).map(e => {

      const title = e.querySelector("title")?.textContent;
      const link = e.querySelector("link")?.getAttribute("href");
      const id = e.querySelector("yt\\:videoId")?.textContent;

      if (!id) return "";

      return `
        <div>
          <div class="thumb">
            <img src="https://i.ytimg.com/vi/${id}/hqdefault.jpg">
          </div>
          <div class="title">
            <a href="${link}" target="_blank">${title}</a>
          </div>
        </div>
      `;
    }).join("");

    document.getElementById("content").innerHTML =
      `<div class="video-grid">${videos}</div>`;

  } catch (e) {

    console.error(e);

    document.getElementById("content").innerHTML =
      `
      <div style="font-size:12px;color:red;">
        RSS読み込み失敗<br>
        原因: ${e.message}
      </div>
      `;
  }
}

</script>

</body>
</html>
