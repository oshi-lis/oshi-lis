<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>
</head>
<body>

<div id="content">loading...</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

function showError(msg){
  document.getElementById("content").innerHTML = msg;
}

async function load(){

  try{

    const ch = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
    ).then(r=>r.json());

    if(!ch.items){
      showError("チャンネル取得失敗（APIキー）");
      return;
    }

    const uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

    let all = [];
    let token = "";

    while(true){

      let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploads}&maxResults=50&key=${API_KEY}`;
      if(token) url += `&pageToken=${token}`;

      const res = await fetch(url).then(r=>r.json());

      if(!res.items){
        showError("動画取得失敗");
        return;
      }

      all = all.concat(res.items);

      if(!res.nextPageToken) break;
      token = res.nextPageToken;
    }

    document.getElementById("content").innerHTML =
      "取得成功：動画数 " + all.length;

  }catch(e){
    showError("通信エラー");
  }

}

load();

</script>

</body>
</html>
