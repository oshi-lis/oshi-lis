<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 8px;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title {
  margin-top: 4px;
  font-size: 11px;
  line-height: 1.3;
}

.title a {
  text-decoration: none;
  color: #222;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

h3 {
  margin: 20px 0 10px;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="setTab('goods')">グッズ</div>
    <div class="tab" onclick="setTab('song')">歌枠</div>
    <div class="tab" onclick="setTab('archive')">アーカイブ</div>
    <div class="tab" onclick="setTab('news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";

let currentTab = "goods";

const data = {
  goods: ["誕生日グッズ2024", "アクリルスタンド"],
  song: ["歌枠まとめ", "アニソン歌枠"],
  news: ["新衣装発表", "ライブ出演"]
};

function setTab(tab) {
  currentTab = tab;
  render();
}

/* =========================
   初期描画
========================= */
render();

/* =========================
   UI描画
========================= */
function render() {

  document.querySelectorAll(".tab").forEach((t, i) => {
    const map = ["goods", "song", "archive", "news"];
    t.classList.toggle("active", map[i] === currentTab);
  });

  if (currentTab === "archive") {
    loadArchive();
    return;
  }

  document.getElementById("content").innerHTML =
    "<ul>" +
    (data[currentTab] || []).map(v => `<li>${v}</li>`).join("") +
    "</ul>";
}

/* =========================
   アーカイブ（完全版）
========================= */
async function loadArchive() {

  document.getElementById("content").innerHTML = "読み込み中...";

  try {

    const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

    function normalize(text = "") {
      return text.toLowerCase();
    }

    function matchAny(text, list) {
      const t = normalize(text);
      return list.some(w => t.includes(w));
    }

    function isShort(duration) {
      const match = duration.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
      const m = parseInt(match?.[1] || "0");
      const s = parseInt(match?.[2] || "0");
      return m === 0 && s <= 60;
    }

    const RULES = {
      live: ["歌枠", "配信", "雑談", "live", "ライブ", "stream"],
      uta: ["歌ってみた", "cover"],
      original: ["オリジナル", "mv", "music video"],
      clip: ["切り抜き", "clip", "highlight"],
      shorts: ["#shorts", "shorts"]
    };

    // search
    const searchRes = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet` +
      `&channelId=${CHANNEL_ID}&order=date&type=video&maxResults=12&key=${API_KEY}`
    );

    const searchData = await searchRes.json();

    const ids = searchData.items
      .map(v => v.id?.videoId)
      .filter(Boolean)
      .join(",");

    // videos
    const videoRes = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${ids}&key=${API_KEY}`
    );

    const videoData = await videoRes.json();

    const groups = {
      live: [],
      shorts: [],
      uta: [],
      original: [],
      clip: [],
      other: []
    };

    function html(v) {
      return `
        <div>
          <div class="thumb">
            <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
          </div>
          <div class="title">
            <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank">
              ${v.snippet.title}
            </a>
          </div>
        </div>
      `;
    }

    videoData.items.forEach(v => {

      const title = v.snippet.title || "";
      const duration = v.contentDetails.duration;
      const live = v.snippet.liveBroadcastContent;

      const card = html(v);

      if (isShort(duration) || matchAny(title, RULES.shorts)) {
        groups.shorts.push(card);
        return;
      }

      if (live === "live" || matchAny(title, RULES.live)) {
        groups.live.push(card);
        return;
      }

      if (matchAny(title, RULES.uta)) {
        groups.uta.push(card);
        return;
      }

      if (matchAny(title, RULES.original)) {
        groups.original.push(card);
        return;
      }

      if (matchAny(title, RULES.clip)) {
        groups.clip.push(card);
        return;
      }

      groups.other.push(card);
    });

    document.getElementById("content").innerHTML = `

      <div>
        <h3>ライブ配信</h3>
        <div class="video-grid">${groups.live.join("")}</div>
      </div>

      <div>
        <h3>ショート</h3>
        <div class="video-grid">${groups.shorts.join("")}</div>
      </div>

      <div>
        <h3>歌ってみた</h3>
        <div class="video-grid">${groups.uta.join("")}</div>
      </div>

      <div>
        <h3>オリジナル曲</h3>
        <div class="video-grid">${groups.original.join("")}</div>
      </div>

      <div>
        <h3>切り抜き</h3>
        <div class="video-grid">${groups.clip.join("")}</div>
      </div>

      <div>
        <h3>その他</h3>
        <div class="video-grid">${groups.other.join("")}</div>
      </div>

    `;

  } catch (e) {

    document.getElementById("content").innerHTML =
      `<pre style="color:red;">エラー\n${e.message}</pre>`;
  }
}

</script>

</body>
</html>
