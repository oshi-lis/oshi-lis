<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* 上部 */
.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

/* タブ */
.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

/* 中身 */
.content {
  margin-top: 15px;
}

/* 🔥 動画カード（重要） */
.video-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

@media (min-width: 600px) {
  .video-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.video-card {
  display: flex;
  flex-direction: column;
}

.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 10px;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.title {
  margin-top: 6px;
  font-size: 13px;
}

/* 戻る */
.back {
  display: inline-block;
  margin-top: 20px;
  font-size: 13px;
  color: #666;
  text-decoration: none;
}
</style>

</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <div class="tab active" onclick="showTab(event, 'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
    <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
  </div>

  <!-- 中身 -->
  <div class="content" id="content"></div>

  <a href="index.html" class="back">← Back</a>

</div>

<script>

const data = {
  goods: [
    "誕生日グッズ2024",
    "アクリルスタンド"
  ],
  song: [
    "アニソン縛り歌枠",
    "深夜歌枠"
  ],
  news: [
    "新衣装発表",
    "ライブ出演"
  ]
};

function showTab(e, type) {

  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.remove("active");
  });
  e.target.classList.add("active");

  if(type === "archive") {
    loadArchive();
    return;
  }

  const content = document.getElementById("content");
  content.innerHTML =
    "<ul>" +
    data[type].map(item => `<li>${item}</li>`).join("") +
    "</ul>";
}

// 初期表示
showTab({target: document.querySelector(".tab.active")}, "goods");

async function loadArchive() {
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UCo2N7C-Z91waaR6lF3LL_jw");
  const data = await res.json();

  const videos = data.items
    .filter(v => !v.link.includes("shorts"))
    .slice(0, 6);

  const list = videos.map(v =>
    `<div class="video-card">
      <div class="thumb">
        <img src="${v.thumbnail}">
      </div>
      <div class="title">
        <a href="${v.link}" target="_blank" style="text-decoration:none;color:#222;">
          ${v.title}
        </a>
      </div>
    </div>`
  ).join("");

  document.getElementById("content").innerHTML =
    `<div class="video-grid">${list}</div>`;
}

</script>

</body>
</html>
