<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="card">
  <div id="content">loading...</div>
</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

/* =========================
   安全：全部取得（playlist）
========================= */
async function getAllPlaylistItems(playlistId){

  var all = [];
  var pageToken = "";

  while(true){

    var url = "https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId="
      + playlistId
      + "&maxResults=50"
      + "&key=" + API_KEY;

    if(pageToken){
      url += "&pageToken=" + pageToken;
    }

    var res = await fetch(url);
    var data = await res.json();

    if(data.items){
      all = all.concat(data.items);
    }

    if(!data.nextPageToken) break;

    pageToken = data.nextPageToken;
  }

  return all;
}

/* =========================
   安全：videos分割取得
========================= */
async function getVideosByIds(ids){

  var all = [];

  for(var i=0;i<ids.length;i+=50){

    var chunk = ids.slice(i, i+50);

    var url = "https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id="
      + chunk.join(",")
      + "&key=" + API_KEY;

    var res = await fetch(url);
    var data = await res.json();

    if(data.items){
      all = all.concat(data.items);
    }
  }

  return all;
}

/* =========================
   duration
========================= */
function parseDuration(d){
  if(!d) return 0;
  var m = d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return 0;
  return (Number(m[1]||0)*60 + Number(m[2]||0));
}

/* =========================
   メイン
========================= */
async function load(){

  var el = document.getElementById("content");
  el.innerHTML = "loading...";

  try{

    // チャンネル
    var ch = await fetch(
      "https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id="
      + CHANNEL_ID + "&key=" + API_KEY
    ).then(r=>r.json());

    var uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

    // 全動画
    var pl = await getAllPlaylistItems(uploads);

    var ids = pl.map(function(v){
      return v.snippet.resourceId.videoId;
    });

    var videos = await getVideosByIds(ids);

    // 分類
    var g = {live:[], song:[], original:[], clip:[], short:[]};

    videos.forEach(function(v){

      var title = v.snippet.title || "";
      var sec = parseDuration(v.contentDetails.duration);

      if(title.indexOf("切り抜き") !== -1) return g.clip.push(v);
      if(title.indexOf("歌ってみた") !== -1) return g.song.push(v);
      if(title.indexOf("オリジナル") !== -1) return g.original.push(v);
      if(title.indexOf("配信") !== -1 || sec >= 1800) return g.live.push(v);
      if(sec > 0 && sec <= 60) return g.short.push(v);

    });

    // 表示
    function render(arr){
      return arr.map(function(v){
        return '<div class="thumb">'
          + '<img src="https://i.ytimg.com/vi/' + v.id + '/hqdefault.jpg">'
          + '<div>' + v.snippet.title + '</div>'
          + '</div>';
      }).join("");
    }

    el.innerHTML =
      "<h3>配信アーカイブ</h3><div class='video-grid'>" + render(g.live) + "</div>" +
      "<h3>歌ってみた</h3><div class='video-grid'>" + render(g.song) + "</div>" +
      "<h3>オリ曲</h3><div class='video-grid'>" + render(g.original) + "</div>" +
      "<h3>切り抜き</h3><div class='video-grid'>" + render(g.clip) + "</div>" +
      "<h3>ショート</h3><div class='video-grid'>" + render(g.short) + "</div>";

  }catch(e){
    el.innerHTML = "エラー出てる（APIキー or 通信）";
  }
}

load();

</script>

</body>
</html>
