<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 8px;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title {
  margin-top: 4px;
  font-size: 11px;
  line-height: 1.3;
}

.title a {
  text-decoration: none;
  color: #222;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

h3 {
  margin: 20px 0 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="setTab('goods')">グッズ</div>
    <div class="tab" onclick="setTab('song')">歌枠</div>
    <div class="tab" onclick="setTab('archive')">アーカイブ</div>
    <div class="tab" onclick="setTab('news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

let currentTab = "goods";

const data = {
  goods: ["誕生日グッズ2024", "アクリルスタンド"],
  song: ["歌枠まとめ", "アニソン歌枠"],
  news: ["新衣装発表", "ライブ出演"]
};

function setTab(tab) {
  currentTab = tab;
  render();
}

render();

/* =========================
   UI
========================= */
function render() {

  document.querySelectorAll(".tab").forEach((t, i) => {
    const map = ["goods", "song", "archive", "news"];
    t.classList.toggle("active", map[i] === currentTab);
  });

  if (currentTab === "archive") {
    loadArchive();
    return;
  }

  document.getElementById("content").innerHTML =
    "<ul>" +
    (data[currentTab] || []).map(v => `<li>${v}</li>`).join("") +
    "</ul>";
}

/* =========================
   アーカイブ（完全安定版）
========================= */
async function loadArchive() {

  document.getElementById("content").innerHTML = "読み込み中...";

  try {

    // =========================
    // ① uploads取得（ここが本体）
    // =========================
    const chRes = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
    );

    const chData = await chRes.json();

    const uploadsId =
      chData.items[0].contentDetails.relatedPlaylists.uploads;

    // =========================
    // ② playlist取得
    // =========================
    const plRes = await fetch(
      `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=20&key=${API_KEY}`
    );

    const plData = await plRes.json();

    const ids = plData.items
      .map(v => v.snippet.resourceId.videoId)
      .join(",");

    // =========================
    // ③ videos詳細取得
    // =========================
    const vRes = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${ids}&key=${API_KEY}`
    );

    const vData = await vRes.json();

    // =========================
    // 分類ルール（タイトルのみ）
    // =========================
    const groups = {
      live: [],
      uta: [],
      original: [],
      clip: [],
      shorts: [],
      other: []
    };

    function match(title, list) {
      const t = (title || "").toLowerCase();
      return list.some(w => t.includes(w));
    }

    function html(v) {
      return `
        <div>
          <div class="thumb">
            <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
          </div>
          <div class="title">
            <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank">
              ${v.snippet.title}
            </a>
          </div>
        </div>
      `;
    }

    // =========================
    // 分類（重要：順番）
    // =========================
    vData.items.forEach(v => {

      const title = v.snippet.title || "";
      const htmlCard = html(v);

      // ① ライブ（最優先）
      if (match(title, ["歌枠", "配信", "雑談", "live", "stream", "ライブ"])) {
        groups.live.push(htmlCard);
        return;
      }

      // ② 歌ってみた
      if (match(title, ["歌ってみた", "cover"])) {
        groups.uta.push(htmlCard);
        return;
      }

      // ③ オリ曲
      if (match(title, ["オリジナル", "mv", "music video", "original"])) {
        groups.original.push(htmlCard);
        return;
      }

      // ④ 切り抜き
      if (match(title, ["切り抜き", "clip", "highlight", "まとめ"])) {
        groups.clip.push(htmlCard);
        return;
      }

      // ⑤ shorts（完全タイトルのみ）
      if (match(title, ["#shorts", "shorts"])) {
        groups.shorts.push(htmlCard);
        return;
      }

      groups.other.push(htmlCard);
    });

    // =========================
    // 表示
    // =========================
    document.getElementById("content").innerHTML = `

      <div>
        <h3>ライブ配信</h3>
        <div class="video-grid">${groups.live.join("")}</div>
      </div>

      <div>
        <h3>歌ってみた</h3>
        <div class="video-grid">${groups.uta.join("")}</div>
      </div>

      <div>
        <h3>オリジナル曲</h3>
        <div class="video-grid">${groups.original.join("")}</div>
      </div>

      <div>
        <h3>切り抜き</h3>
        <div class="video-grid">${groups.clip.join("")}</div>
      </div>

      <div>
        <h3>ショート</h3>
        <div class="video-grid">${groups.shorts.join("")}</div>
      </div>

      <div>
        <h3>その他</h3>
        <div class="video-grid">${groups.other.join("")}</div>
      </div>

    `;

  } catch (e) {

    document.getElementById("content").innerHTML =
      `<pre style="color:red;">エラー\n${e.message}</pre>`;
  }
}

</script>

</body>
</html>
