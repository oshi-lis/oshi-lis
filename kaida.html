<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>甲斐田　晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

.top img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.content ul {
  padding: 0;
  list-style: none;
}

.video-item {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
}

.video-item img {
  width: 120px;
  height: 68px;
  border-radius: 8px;
  object-fit: cover;
}

.video-title {
  font-size: 13px;
  line-height: 1.4;
  flex: 1;
}

.category-title {
  display: block;
  font-weight: bold;
  margin: 20px 0 10px;
  font-size: 14px;
  color: #444;
}

.back {
  display: inline-block;
  margin-top: 20px;
  font-size: 13px;
  color: #666;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田　晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab(event, 'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
    <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

  <a href="index.html" class="back">← Back</a>
</div>

<script>
const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

const data = {
  goods: ["誕生日グッズ2024", "アクリルスタンド"],
  song: ["アニソン縛り歌枠", "深夜歌枠"],
  news: ["新衣装発表", "ライブ出演"]
};

async function showTab(e, type) {
  document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
  if (e && e.target) {
    e.target.classList.add("active");
  } else {
    const tabs = document.querySelectorAll(".tab");
    const map = { goods: 0, song: 1, archive: 2, news: 3 };
    tabs[map[type]]?.classList.add("active");
  }

  const content = document.getElementById("content");

  if (type !== "archive") {
    content.innerHTML = "<ul>" + data[type].map(item => `<li>${item}</li>`).join("") + "</ul>";
  } else {
    loadArchive();
  }
}

function parseDuration(d) {
  const m = d.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  return (Number(m[1] || 0) * 3600) + (Number(m[2] || 0) * 60) + Number(m[3] || 0);
}

async function loadArchive() {
  const el = document.getElementById("content");
  el.innerHTML = "読み込み中...";

  try {
    const ch = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`).then(r => r.json());
    const uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

    const pl = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=contentDetails&playlistId=${uploads}&maxResults=15&key=${API_KEY}`).then(r => r.json());
    const ids = pl.items.map(v => v.contentDetails.videoId).join(",");

    const vd = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,liveStreamingDetails&id=${ids}&key=${API_KEY}`).then(r => r.json());

    const groups = { live: [], song: [], short: [] };

    vd.items.forEach(v => {
      const item = {
        title: v.snippet.title,
        thumb: v.snippet.thumbnails.medium.url
      };
      const sec = parseDuration(v.contentDetails.duration);
      
      if (sec <= 60) {
        groups.short.push(item);
      } else if (item.title.includes("歌ってみた") || item.title.includes("Cover") || item.title.includes("MV")) {
        groups.song.push(item);
      } else {
        // 歌とショート以外はすべてライブに集約
        groups.live.push(item);
      }
    });

    const render = (label, arr) => arr.length ? `
      <span class="category-title">${label}</span>
      <ul>
        ${arr.map(v => `
          <li class="video-item">
            <img src="${v.thumb}">
            <div class="video-title">${v.title}</div>
          </li>
        `).join("")}
      </ul>` : "";

    el.innerHTML = render("ライブ", groups.live) + render("歌", groups.song) + render("ショート", groups.short);

  } catch (e) {
    el.innerHTML = "読み込み失敗";
  }
}

showTab(null, "goods");
</script>

</body>
</html>
