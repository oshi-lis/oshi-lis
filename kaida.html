<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb {
  font-size: 12px;
}

.thumb img {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 8px;
  object-fit: cover;
}

.back {
  display: inline-block;
  margin-top: 20px;
  font-size: 13px;
  color: #666;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="showTab(event, 'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
    <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

  <a href="index.html" class="back">← Back</a>

</div>

<script>

/* ===== duration ===== */
function parseDuration(d) {
  if (!d) return 0;
  const m = d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  return m ? (Number(m[1]||0)*60 + Number(m[2]||0)) : 0;
}

/* ===== 判定強化 ===== */

// ★ショート最優先（絶対ブレさせない）
function isShort(v) {
  return parseDuration(v.contentDetails?.duration) <= 60;
}

// ★ライブ（ショートより後で評価）
function isLive(v) {
  const sec = parseDuration(v.contentDetails?.duration);
  const t = (v.snippet?.title || "").toLowerCase();

  return sec >= 3600 ||
    t.includes("配信") ||
    t.includes("ライブ") ||
    t.includes("live") ||
    t.includes("雑談") ||
    t.includes("歌枠");
}

// ★歌ってみた
function isSong(v) {
  const t = v.snippet?.title || "";
  return t.includes("歌ってみた") || t.includes("cover");
}

// ★切り抜き（ここ強化）
function isClip(v) {
  const t = (v.snippet?.title || "").toLowerCase();
  return (
    t.includes("切り抜き") ||
    t.includes("#切り抜き") ||
    t.includes("clip") ||
    t.includes("short clip")
  );
}

// ★オリ曲
function isOriginal(v) {
  const t = (v.snippet?.title || "").toLowerCase();
  return (
    t.includes("オリジナル") ||
    t.includes("mv") ||
    t.includes("試聴") ||
    t.includes("music video")
  );
}

/* ===== ★重要：分類順（ここで混入が決まる） ===== */
function classify(v, groups) {

  if (isShort(v)) return groups.short.push(v);
  if (isClip(v)) return groups.clip.push(v);
  if (isSong(v)) return groups.song.push(v);
  if (isOriginal(v)) return groups.original.push(v);
  if (isLive(v)) return groups.live.push(v);

}
</script>

</body>
</html>
