<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 8px;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title {
  margin-top: 4px;
  font-size: 11px;
}

.title a {
  text-decoration: none;
  color: #222;
}

/* デバッグ */
.debug {
  font-size: 10px;
  color: red;
  white-space: pre-wrap;
  background: #111;
  color: #0f0;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="setTab('goods')">グッズ</div>
    <div class="tab" onclick="setTab('song')">歌枠</div>
    <div class="tab" onclick="setTab('archive')">アーカイブ</div>
    <div class="tab" onclick="setTab('news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";

const data = {
  goods: ["誕生日グッズ2024", "アクリルスタンド"],
  song: ["歌枠まとめ", "アニソン歌枠"],
  news: ["新衣装発表", "ライブ出演"]
};

let currentTab = localStorage.getItem("tab") || "goods";

/* =========================
   タブ保存
========================= */
function setTab(tab) {
  currentTab = tab;
  localStorage.setItem("tab", tab);
  render();
}

/* =========================
   描画
========================= */
function render() {

  document.querySelectorAll(".tab").forEach((t, i) => {
    const map = ["goods", "song", "archive", "news"];
    t.classList.toggle("active", map[i] === currentTab);
  });

  if (currentTab === "archive") {
    loadArchive();
    return;
  }

  document.getElementById("content").innerHTML =
    "<ul>" + (data[currentTab] || []).map(v => `<li>${v}</li>`).join("") + "</ul>";
}

/* =========================
   アーカイブ（完全デバッグ版）
========================= */
async function loadArchive() {

  document.getElementById("content").innerHTML = "読み込み中...";

  try {

    const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

    // =========================
    // ① search（動画ID取得）
    // =========================
    const searchUrl =
      `https://www.googleapis.com/youtube/v3/search?part=snippet` +
      `&channelId=${CHANNEL_ID}` +
      `&order=date&type=video&maxResults=12&key=${API_KEY}`;

    const searchRes = await fetch(searchUrl);
    const searchData = await searchRes.json();

    if (!searchData.items) {
      throw new Error(JSON.stringify(searchData));
    }

    const ids = searchData.items
      .map(v => v.id?.videoId)
      .filter(Boolean)
      .join(",");

    // =========================
    // ② videos（詳細取得）
    // =========================
    const videoUrl =
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${ids}&key=${API_KEY}`;

    const videoRes = await fetch(videoUrl);
    const videoData = await videoRes.json();

    if (!videoData.items) {
      throw new Error(JSON.stringify(videoData));
    }

    // =========================
    // 分類用配列
    // =========================
    const groups = {
      live: [],
      shorts: [],
      uta: [],
      original: [],
      clip: [],
      other: []
    };

    // =========================
    // HTML生成
    // =========================
    function createHTML(v) {

      const videoId = v.id;
      const title = v.snippet.title;

      return `
        <div>
          <div class="thumb">
            <img src="https://i.ytimg.com/vi/${videoId}/hqdefault.jpg">
          </div>
          <div class="title">
            <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank">
              ${title}
            </a>
          </div>
        </div>
      `;
    }

    // =========================
    // ショート判定
    // =========================
    function isShort(duration) {
      const match = duration.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
      const m = parseInt(match?.[1] || "0");
      const s = parseInt(match?.[2] || "0");
      return m === 0 && s <= 60;
    }

    // =========================
    // 分類処理
    // =========================
    videoData.items.forEach(v => {

      const title = v.snippet.title || "";
      const duration = v.contentDetails.duration;
      const live = v.snippet.liveBroadcastContent;

      const html = createHTML(v);

      // shorts
      if (isShort(duration) || title.includes("#shorts")) {
        groups.shorts.push(html);
        return;
      }

      // live
      if (
        live === "live" ||
        title.includes("歌枠") ||
        title.includes("配信") ||
        title.includes("雑談")
      ) {
        groups.live.push(html);
        return;
      }

      // uta (歌ってみた)
      if (
        title.includes("歌ってみた") ||
        title.toLowerCase().includes("cover")
      ) {
        groups.uta.push(html);
        return;
      }

      // original
      if (
        title.includes("オリジナル") ||
        title.toLowerCase().includes("mv")
      ) {
        groups.original.push(html);
        return;
      }

      // clip
      if (
        title.includes("切り抜き") ||
        title.includes("clip") ||
        title.includes("highlight")
      ) {
        groups.clip.push(html);
        return;
      }

      // other
      groups.other.push(html);
    });

    // =========================
    // 表示
    // =========================
    document.getElementById("content").innerHTML = `

      <div>
        <h3>ライブ配信</h3>
        <div class="video-grid">${groups.live.join("")}</div>
      </div>

      <div>
        <h3>ショート</h3>
        <div class="video-grid">${groups.shorts.join("")}</div>
      </div>

      <div>
        <h3>歌ってみた</h3>
        <div class="video-grid">${groups.uta.join("")}</div>
      </div>

      <div>
        <h3>オリジナル曲</h3>
        <div class="video-grid">${groups.original.join("")}</div>
      </div>

      <div>
        <h3>切り抜き</h3>
        <div class="video-grid">${groups.clip.join("")}</div>
      </div>

      <div>
        <h3>その他</h3>
        <div class="video-grid">${groups.other.join("")}</div>
      </div>

    `;

  } catch (e) {

    document.getElementById("content").innerHTML =
      `<pre style="color:red;">
エラー
${e.message}
      </pre>`;
  }
}

</script>

</body>
</html>
