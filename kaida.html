<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: #fff;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="card">
  <div class="tabs">
    <div class="tab active" onclick="load()">アーカイブ</div>
  </div>

  <div id="content">loading...</div>
</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

/* ===== 全取得 ===== */
async function getAllVideos(){

  const ch = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
  ).then(r=>r.json());

  const uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

  let all = [];
  let token = "";

  while(true){

    let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`;
    if(token) url += `&pageToken=${token}`;

    const res = await fetch(url).then(r=>r.json());

    all = all.concat(res.items || []);

    if(!res.nextPageToken) break;
    token = res.nextPageToken;
  }

  return all;
}

/* ===== videos分割 ===== */
async function getDetails(ids){

  let all = [];

  for(let i=0;i<ids.length;i+=50){

    const chunk = ids.slice(i,i+50);

    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${chunk.join(",")}&key=${API_KEY}`
    ).then(r=>r.json());

    all = all.concat(res.items || []);
  }

  return all;
}

/* ===== duration修正 ===== */
function parseDuration(d){
  if(!d) return 0;

  const h = d.match(/(\d+)H/);
  const m = d.match(/(\d+)M/);
  const s = d.match(/(\d+)S/);

  return (Number(h?.[1]||0)*3600)
       + (Number(m?.[1]||0)*60)
       + Number(s?.[1]||0);
}

/* ===== メイン ===== */
async function load(){

  const el = document.getElementById("content");
  el.innerHTML = "loading...";

  try{

    const list = await getAllVideos();

    const ids = list.map(v=>v.snippet.resourceId.videoId);

    const videos = await getDetails(ids);

    const g = {live:[], song:[], original:[], clip:[], short:[]};

    videos.forEach(v=>{

      const title = v.snippet.title || "";
      const sec = parseDuration(v.contentDetails.duration);

      if(title.includes("切り抜き")) return g.clip.push(v);
      if(title.includes("オリジナル") || title.includes("試聴")) return g.original.push(v);
      if(title.includes("歌ってみた")) return g.song.push(v);
      if(title.includes("配信") || title.includes("雑談") || sec >= 1800) return g.live.push(v);
      if(sec > 0 && sec <= 60) return g.short.push(v);

    });

    const render = arr => arr.map(v=>`
      <div class="thumb">
        <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
        <div>${v.snippet.title}</div>
      </div>
    `).join("");

    el.innerHTML = `
      <h3>配信アーカイブ</h3><div class="video-grid">${render(g.live)}</div>
      <h3>歌ってみた</h3><div class="video-grid">${render(g.song)}</div>
      <h3>オリ曲</h3><div class="video-grid">${render(g.original)}</div>
      <h3>切り抜き</h3><div class="video-grid">${render(g.clip)}</div>
      <h3>ショート</h3><div class="video-grid">${render(g.short)}</div>
    `;

  }catch(e){
    el.innerHTML = "エラー（APIキー or 通信）";
  }
}

load();

</script>

</body>
</html>
