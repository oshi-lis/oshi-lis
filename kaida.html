<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

.icon {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.tab.active {
  background: #222;
  color: #fff;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  border-radius: 8px;
}

.pagination {
  margin-top: 12px;
  display:flex;
  gap:6px;
  justify-content:center;
  font-size:12px;
}

.page-btn{
  padding:4px 8px;
  background:#eee;
  border-radius:6px;
  cursor:pointer;
}

.page-btn.active{
  background:#222;
  color:#fff;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png" class="icon">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="showTab(event,'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event,'song')">歌枠</div>
    <div class="tab" onclick="showTab(event,'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event,'news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6fL3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

const data = {
  goods: ["誕生日グッズ2024","アクリルスタンド"],
  song: ["アニソン縛り歌枠","深夜歌枠"],
  news: ["新衣装発表","ライブ出演"]
};

let videos = [];
let currentPage = 1;
const perPage = 6;

/* ===== タブ ===== */
function showTab(e,type){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  e.target.classList.add("active");

  const el = document.getElementById("content");

  if(type==="archive"){
    loadArchive();
    return;
  }

  el.innerHTML =
    "<ul>" +
    (data[type]||[]).map(v=>`<li>${v}</li>`).join("") +
    "</ul>";
}

/* ===== fetch安全版 ===== */
async function getAllVideos(){

  const el = document.getElementById("content");

  try{

    const ch = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
    ).then(r=>r.json());

    if(!ch.items || !ch.items.length){
      el.innerHTML = "❌ チャンネル取得失敗";
      return [];
    }

    const uploads = ch.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;

    if(!uploads){
      el.innerHTML = "❌ uploads取得失敗";
      return [];
    }

    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`
    ).then(r=>r.json());

    return res.items || [];

  }catch(e){
    el.innerHTML = "❌ 通信エラー";
    return [];
  }
}

/* ===== アーカイブロード ===== */
async function loadArchive(){

  const el = document.getElementById("content");
  el.innerHTML = "loading...";

  const list = await getAllVideos();

  if(!list.length){
    return;
  }

  videos = list.map(v => ({
    id: v?.snippet?.resourceId?.videoId,
    title: v?.snippet?.title
  })).filter(v => v.id);

  currentPage = 1;
  renderArchive();
}

/* ===== ページ描画 ===== */
function renderArchive(){

  const el = document.getElementById("content");

  const start = (currentPage-1)*perPage;
  const pageItems = videos.slice(start,start+perPage);

  const totalPages = Math.ceil(videos.length/perPage);

  el.innerHTML = `
    <div class="video-grid">
      ${pageItems.map(v=>`
        <div class="thumb">
          <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank">
            <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
            <div>${v.title}</div>
          </a>
        </div>
      `).join("")}
    </div>

    <div class="pagination">
      ${Array.from({length: totalPages},(_,i)=>`
        <div class="page-btn ${i+1===currentPage?'active':''}"
             onclick="changePage(${i+1})">${i+1}</div>
      `).join("")}
    </div>
  `;
}

function changePage(p){
  currentPage = p;
  renderArchive();
}

/* ===== 初期 ===== */
showTab({target:document.querySelector(".tab")}, "goods");

</script>

</body>
</html>
