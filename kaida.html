<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 8px;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title {
  margin-top: 4px;
  font-size: 11px;
  line-height: 1.3;
}

.title a {
  text-decoration: none;
  color: #222;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

h3 {
  margin: 20px 0 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="setTab('goods')">グッズ</div>
    <div class="tab" onclick="setTab('song')">歌枠</div>
    <div class="tab" onclick="setTab('archive')">アーカイブ</div>
    <div class="tab" onclick="setTab('news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "YOUR_API_KEY";

/* =========================
   タブ固定
========================= */
function saveTab(tab) {
  localStorage.setItem("lastTab", tab);
}

function loadTab() {
  return localStorage.getItem("lastTab") || "goods";
}

let currentTab = loadTab();

function setTab(tab) {
  currentTab = tab;
  saveTab(tab);
  render();
}

document.addEventListener("DOMContentLoaded", render);

/* =========================
   UI
========================= */
const data = {
  goods: ["誕生日グッズ2024", "アクリルスタンド"],
  song: ["歌枠まとめ", "アニソン歌枠"],
  news: ["新衣装発表", "ライブ出演"]
};

function render() {

  const map = ["goods", "song", "archive", "news"];

  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("active", map[i] === currentTab);
  });

  if (currentTab === "archive") {
    loadArchive();
    return;
  }

  document.getElementById("content").innerHTML =
    "<ul>" +
    (data[currentTab] || []).map(v => `<li>${v}</li>`).join("") +
    "</ul>";
}

/* =========================
   Shorts判定（完全安定版）
========================= */
function isShort(v) {

  const d = v.contentDetails?.duration;

  // ★欠損ガード
  if (!d) return false;

  const m = d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return false;

  const min = parseInt(m[1] || "0");
  const sec = parseInt(m[2] || "0");

  const total = (min * 60) + sec;

  return total <= 60;
}

/* =========================
   アーカイブ
========================= */
async function loadArchive() {

  const el = document.getElementById("content");
  el.innerHTML = "読み込み中...";

  try {

    const ch = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
    ).then(r => r.json());

    const uploadsId =
      ch?.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;

    if (!uploadsId) throw new Error("uploads取得失敗");

    const pl = await fetch(
      `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploadsId}&maxResults=50&key=${API_KEY}`
    ).then(r => r.json());

    const ids = (pl.items || [])
      .map(v => v?.snippet?.resourceId?.videoId)
      .filter(Boolean)
      .join(",");

    const vd = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${ids}&key=${API_KEY}`
    ).then(r => r.json());

    const videos = vd.items || [];

    const groups = {
      live: [],
      uta: [],
      original: [],
      clip: [],
      shorts: [],
      other: []
    };

    const match = (t, list) =>
      list.some(w => (t || "").toLowerCase().includes(w));

    const html = (v) => {
      const id = v.id;
      const title = v.snippet?.title || "";

      return `
        <div>
          <div class="thumb">
            <img src="https://i.ytimg.com/vi/${id}/hqdefault.jpg">
          </div>
          <div class="title">
            <a href="https://www.youtube.com/watch?v=${id}" target="_blank">${title}</a>
          </div>
        </div>
      `;
    };

    videos.forEach(v => {

      const title = v.snippet?.title || "";
      const card = html(v);

      if (isShort(v)) return groups.shorts.push(card);

      if (match(title, ["切り抜き","clip","highlight","まとめ"]))
        return groups.clip.push(card);

      if (match(title, ["歌ってみた","cover"]))
        return groups.uta.push(card);

      if (match(title, ["オリジナル","original","mv","music video"]))
        return groups.original.push(card);

      if (match(title, ["配信","歌枠","ライブ","live","stream"]))
        return groups.live.push(card);

      groups.other.push(card);
    });

    el.innerHTML = `
      <div><h3>ライブ</h3><div class="video-grid">${groups.live.join("")}</div></div>
      <div><h3>歌ってみた</h3><div class="video-grid">${groups.uta.join("")}</div></div>
      <div><h3>オリジナル</h3><div class="video-grid">${groups.original.join("")}</div></div>
      <div><h3>切り抜き</h3><div class="video-grid">${groups.clip.join("")}</div></div>
      <div><h3>ショート</h3><div class="video-grid">${groups.shorts.join("")}</div></div>
      <div><h3>その他</h3><div class="video-grid">${groups.other.join("")}</div></div>
    `;

  } catch (e) {
    el.innerHTML = `<pre style="color:red;">${e.message}</pre>`;
  }
}

</script>

</body>
</html>
