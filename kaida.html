<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* 上部 */
.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

/* タブ */
.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

/* 中身 */
.content {
  margin-top: 15px;
}

.content ul {
  padding-left: 18px;
}

.content li {
  margin-bottom: 6px;
}

/* 戻る */
.back {
  display: inline-block;
  margin-top: 20px;
  font-size: 13px;
  color: #666;
  text-decoration: none;
}
</style>

</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <div class="tab active" onclick="showTab(event, 'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
    <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
  </div>

  <!-- 中身 -->
  <div class="content" id="content"></div>

  <a href="index.html" class="back">← Back</a>

</div>

<script>

const data = {
  goods: [
    "誕生日グッズ2024",
    "アクリルスタンド"
  ],
  song: [
    "アニソン縛り歌枠",
    "深夜歌枠"
  ],
  archive: [
    "雑談配信",
    "記念配信"
  ],
  news: [
    "新衣装発表",
    "ライブ出演"
  ]
};

function showTab(e, type) {

  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.remove("active");
  });
  e.target.classList.add("active");

  // 👇ここが追加ポイント！！！
  if(type === "archive") {
    loadArchive();
    return;
  }

  const content = document.getElementById("content");
  content.innerHTML =
    "<ul>" +
    data[type].map(item => `<li>${item}</li>`).join("") +
    "</ul>";
}

// 初期表示
showTab({target: document.querySelector(".tab.active")}, "goods");

// 👇自動取得
async function loadArchive() {
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UCo2N7C-Z91waaR6lF3LL_jw");
  const data = await res.json();

  const videos = data.items
    .filter(v => !v.link.includes("shorts"))
    .slice(0, 6);

const list = videos.map(v =>
  `<li style="margin-bottom:12px;">
    <img src="${v.thumbnail}" style="width:100%;border-radius:10px;">
    <div style="margin-top:6px;">
      <a href="${v.link}" target="_blank" style="text-decoration:none;color:#222;">
        ${v.title}
      </a>
    </div>
  </li>`
).join("");
  document.getElementById("content").innerHTML = "<ul>" + list + "</ul>";
}

</script>

</body>
</html>
