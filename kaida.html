<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 8px;
  object-fit: cover;
}

.thumb div {
  font-size: 12px;
  margin-top: 4px;
}

.back {
  display: inline-block;
  margin-top: 20px;
  font-size: 13px;
  color: #666;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="showTab(event, 'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
    <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

  <a href="index.html" class="back">← Back</a>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

/* =========================
   タブ
========================= */
function showTab(e,type){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  const map=["goods","song","archive","news"];
  const idx = map.indexOf(type);
  if(idx>=0) document.querySelectorAll(".tab")[idx].classList.add("active");

  if(type !== "archive"){
    const data={
      goods:["誕生日グッズ2024","アクリルスタンド"],
      song:["アニソン縛り歌枠","深夜歌枠"],
      news:["新衣装発表","ライブ出演"]
    };

    document.getElementById("content").innerHTML =
      "<ul>" + (data[type]||[]).map(v=>`<li>${v}</li>`).join("") + "</ul>";

    return;
  }

  loadArchive();
}

/* =========================
   API取得（固定方式）
========================= */
async function loadArchive(){

  const el = document.getElementById("content");
  el.innerHTML = "loading...";

  const ch = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
  ).then(r=>r.json());

  const uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

  const pl = await fetch(
    `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`
  ).then(r=>r.json());

  const ids = pl.items
    .map(v => v.snippet.resourceId.videoId)
    .join(",");

  const vd = await fetch(
    `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${ids}&key=${API_KEY}`
  ).then(r=>r.json());

  const videos = vd.items || [];

  /* =========================
     分類（完全固定ルール）
  ========================= */
  const g = {
    live: [],
    song: [],
    original: [],
    clip: [],
    short: []
  };

  videos.forEach(v => {

    const title = v.snippet?.title || "";
    const sec = parseDuration(v.contentDetails?.duration);

    // ① 切り抜き最優先
    if (title.includes("切り抜き") || title.includes("clip")) {
      return g.clip.push(v);
    }

    // ② 歌ってみた
    if (title.includes("歌ってみた") || title.includes("cover")) {
      return g.song.push(v);
    }

    // ③ オリ曲
    if (title.includes("オリジナル") || title.includes("MV") || title.includes("試聴")) {
      return g.original.push(v);
    }

    // ④ 配信（アーカイブ含む）
    if (title.includes("配信") || title.includes("雑談") || sec >= 1800) {
      return g.live.push(v);
    }

    // ⑤ ショート（最後固定）
    if (sec > 0 && sec <= 60) {
      return g.short.push(v);
    }

  });

  /* =========================
     描画
  ========================= */
  const render = arr => arr.map(v => `
    <div class="thumb">
      <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
      <div>${v.snippet.title}</div>
    </div>
  `).join("");

  el.innerHTML = `
    <h3>配信アーカイブ</h3>
    <div class="video-grid">${render(g.live)}</div>

    <h3>歌ってみた</h3>
    <div class="video-grid">${render(g.song)}</div>

    <h3>オリ曲 / 試聴</h3>
    <div class="video-grid">${render(g.original)}</div>

    <h3>切り抜き</h3>
    <div class="video-grid">${render(g.clip)}</div>

    <h3>ショート</h3>
    <div class="video-grid">${render(g.short)}</div>
  `;
}

/* =========================
   duration
========================= */
function parseDuration(d){
  if(!d) return 0;
  const m = d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return 0;
  return (Number(m[1]||0)*60 + Number(m[2]||0));
}

window.addEventListener("load", ()=>{
  showTab(null, "archive");
});

</script>

</body>
</html>
