<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 8px;
  object-fit: cover;
}

.thumb div {
  font-size: 12px;
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="showTab(event, 'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
    <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

/* =========================
   UI
========================= */
function showTab(e,type){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  const map=["goods","song","archive","news"];
  const idx = map.indexOf(type);
  if(idx>=0) document.querySelectorAll(".tab")[idx].classList.add("active");

  if(type !== "archive"){
    const data={
      goods:["誕生日グッズ2024","アクリルスタンド"],
      song:["アニソン縛り歌枠","深夜歌枠"],
      news:["新衣装発表","ライブ出演"]
    };

    document.getElementById("content").innerHTML =
      "<ul>" + (data[type]||[]).map(v=>`<li>${v}</li>`).join("") + "</ul>";

    return;
  }

  loadArchive();
}

/* =========================
   YouTube検索取得
========================= */
async function fetchVideos(query){

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(query)}&channelId=${CHANNEL_ID}&key=${API_KEY}`
  );

  const json = await res.json();
  return json.items || [];
}

/* =========================
   描画
========================= */
function render(items){
  return items.map(v=>`
    <div class="thumb">
      <img src="https://i.ytimg.com/vi/${v.id.videoId}/hqdefault.jpg">
      <div>${v.snippet.title}</div>
    </div>
  `).join("");
}

/* =========================
   メイン
========================= */
async function loadArchive(){

  const el = document.getElementById("content");
  el.innerHTML = "loading...";

  const [
    live,
    song,
    original,
    clip,
    short
  ] = await Promise.all([
    fetchVideos("配信 雑談 マイクラ ARK ポケモン"),
    fetchVideos("歌ってみた cover"),
    fetchVideos("オリジナル MV 試聴"),
    fetchVideos("切り抜き clip"),
    fetchVideos("short #shorts")
  ]);

  el.innerHTML = `
    <h3>配信アーカイブ</h3>
    <div class="video-grid">${render(live)}</div>

    <h3>歌ってみた</h3>
    <div class="video-grid">${render(song)}</div>

    <h3>オリ曲 / 試聴</h3>
    <div class="video-grid">${render(original)}</div>

    <h3>切り抜き</h3>
    <div class="video-grid">${render(clip)}</div>

    <h3>ショート</h3>
    <div class="video-grid">${render(short)}</div>
  `;
}

window.addEventListener("load", ()=>{
  showTab(null, "archive");
});

</script>

</body>
</html>
