<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 8px;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title {
  margin-top: 4px;
  font-size: 11px;
  line-height: 1.3;
}

.title a {
  text-decoration: none;
  color: #222;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

h3 {
  margin: 20px 0 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="setTab('goods')">グッズ</div>
    <div class="tab" onclick="setTab('song')">歌枠</div>
    <div class="tab" onclick="setTab('archive')">アーカイブ</div>
    <div class="tab" onclick="setTab('news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyAhz5t0MJUGT_vx6p2m4rjOlqfu71PSpiE";

let currentTab = "goods";

const data = {
  goods: ["誕生日グッズ2024", "アクリルスタンド"],
  song: ["歌枠まとめ", "アニソン歌枠"],
  news: ["新衣装発表", "ライブ出演"]
};

function setTab(tab) {
  currentTab = tab;
  render();
}

render();

function render() {

  document.querySelectorAll(".tab").forEach((t, i) => {
    const map = ["goods", "song", "archive", "news"];
    t.classList.toggle("active", map[i] === currentTab);
  });

  if (currentTab === "archive") {
    loadArchive();
    return;
  }

  document.getElementById("content").innerHTML =
    "<ul>" +
    (data[currentTab] || []).map(v => `<li>${v}</li>`).join("") +
    "</ul>";
}

/* =========================
   最終安定アーカイブ
========================= */
async function loadArchive() {

  document.getElementById("content").innerHTML = "読み込み中...";

  try {

    const chRes = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
    );

    const chData = await chRes.json();

    const uploadsId =
      chData.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;

    const plRes = await fetch(
      `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploadsId}&maxResults=50&key=${API_KEY}`
    );

    const plData = await plRes.json();

    const items = plData.items || [];

    const ids = items
      .map(v => v?.snippet?.resourceId?.videoId)
      .filter(Boolean)
      .join(",");

    const vRes = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${ids}&key=${API_KEY}`
    );

    const vData = await vRes.json();

    const videos = vData.items || [];

    const groups = {
      live: [],
      uta: [],
      original: [],
      clip: [],
      shorts: [],
      other: []
    };

    /* =========================
       判定関数（最終安定版）
    ========================= */

    const match = (t, list) =>
      list.some(w => (t || "").toLowerCase().includes(w));

    const isShort = (v) => {
      const d = v.contentDetails?.duration || "";
      const m = d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
      const min = parseInt(m?.[1] || "0");
      const sec = parseInt(m?.[2] || "0");
      return min === 0 && sec <= 60;
    };

    const html = (v) => {
      const id = v.id;
      const title = v.snippet?.title || "";

      return `
        <div>
          <div class="thumb">
            <img src="https://i.ytimg.com/vi/${id}/hqdefault.jpg">
          </div>
          <div class="title">
            <a href="https://www.youtube.com/watch?v=${id}" target="_blank">
              ${title}
            </a>
          </div>
        </div>
      `;
    };

    /* =========================
       分類（優先順位固定）
    ========================= */

    videos.forEach(v => {

      const title = v.snippet?.title || "";
      const card = html(v);

      if (!card) return;

      // ① Shorts（最優先）
      if (isShort(v)) {
        groups.shorts.push(card);
        return;
      }

      // ② 切り抜き（守る）
      if (match(title, ["切り抜き","clip","clips","highlight","まとめ"])) {
        groups.clip.push(card);
        return;
      }

      // ③ 歌みた
      if (match(title, ["歌ってみた","cover","covered"])) {
        groups.uta.push(card);
        return;
      }

      // ④ オリ曲
      if (match(title, ["オリジナル","original","mv","music video","official"])) {
        groups.original.push(card);
        return;
      }

      // ⑤ ライブ（最後に弱く拾う）
      if (match(title, ["配信","歌枠","ライブ","live","stream","雑談"])) {
        groups.live.push(card);
        return;
      }

      groups.other.push(card);
    });

    /* =========================
       表示
    ========================= */

    document.getElementById("content").innerHTML = `

      <div>
        <h3>ライブ配信</h3>
        <div class="video-grid">${groups.live.join("")}</div>
      </div>

      <div>
        <h3>歌ってみた</h3>
        <div class="video-grid">${groups.uta.join("")}</div>
      </div>

      <div>
        <h3>オリジナル曲</h3>
        <div class="video-grid">${groups.original.join("")}</div>
      </div>

      <div>
        <h3>切り抜き</h3>
        <div class="video-grid">${groups.clip.join("")}</div>
      </div>

      <div>
        <h3>ショート</h3>
        <div class="video-grid">${groups.shorts.join("")}</div>
      </div>

      <div>
        <h3>その他</h3>
        <div class="video-grid">${groups.other.join("")}</div>
      </div>

    `;

  } catch (e) {

    document.getElementById("content").innerHTML =
      `<pre style="color:red;">エラー\n${e.message}</pre>`;
  }
}

</script>
</body>
</html>
