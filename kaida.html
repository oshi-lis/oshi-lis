<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 8px;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="showTab(event, 'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
    <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

/* =========================
   タイトル正規化
========================= */
function normalizeTitle(title){
  return (title || "")
    .normalize("NFKC")
    .toLowerCase()
    .replace(/[【】\[\]（）()]/g, "")
    .replace(/\s/g, "");
}

/* =========================
   動画正規化
========================= */
function normalizeVideo(v){
  const title = v.snippet?.title || "";
  return {
    id: v.id,
    title,
    t: normalizeTitle(title),
    duration: parseDuration(v.contentDetails?.duration)
  };
}

/* =========================
   時間
========================= */
function parseDuration(d){
  if(!d) return Infinity;
  const m = d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return Infinity;
  return (Number(m[1]||0)*60 + Number(m[2]||0));
}

/* =========================
   分類ルール
========================= */

// 切り抜き（完全安定版）
function isClip(v){
  const t = v.t.replace(/\//g, ""); // ←重要ポイント

  return (
    t.includes("切り抜き") ||
    t.includes("clip") ||
    t.includes("ハイライト")
  );
}

// 歌ってみた
function isSong(v){
  return v.t.includes("歌ってみた") || v.t.includes("cover");
}

// オリ曲 / MV / 試聴
function isOriginal(v){
  return (
    v.t.includes("オリジナル") ||
    v.t.includes("mv") ||
    v.t.includes("試聴")
  );
}

// ライブ（配信アーカイブ）
function isLive(v){
  const t = v.t;
  const sec = v.duration;

  return (
    t.includes("配信") ||
    t.includes("雑談") ||
    t.includes("弾き語り") ||
    t.includes("マイクラ") ||
    t.includes("ark") ||
    t.includes("ぽこあポケモン") ||
    t.includes("minecraft") ||
    t.includes("pokemon") ||
    sec >= 1800
  );
}

// ショート
function isShort(v){
  return v.duration > 0 && v.duration <= 60;
}

/* =========================
   初期化
========================= */
window.addEventListener("load", ()=>{
  showTab(null, "archive");
});

/* =========================
   タブ
========================= */
function showTab(e,type){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  const map=["goods","song","archive","news"];
  const idx = map.indexOf(type);
  if(idx>=0) document.querySelectorAll(".tab")[idx].classList.add("active");

  if(type !== "archive"){
    const data={
      goods:["誕生日グッズ2024","アクリルスタンド"],
      song:["アニソン縛り歌枠","深夜歌枠"],
      news:["新衣装発表","ライブ出演"]
    };

    document.getElementById("content").innerHTML =
      "<ul>" + (data[type]||[]).map(v=>`<li>${v}</li>`).join("") + "</ul>";

    return;
  }

  loadArchive();
}

/* =========================
   YouTube取得
========================= */
async function loadArchive(){

  const el=document.getElementById("content");
  el.innerHTML="loading...";

  const ch=await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
  ).then(r=>r.json());

  const uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

  const pl=await fetch(
    `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`
  ).then(r=>r.json());

  const ids = pl.items.map(v=>v.snippet.resourceId.videoId).join(",");

  const vd=await fetch(
    `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${ids}&key=${API_KEY}`
  ).then(r=>r.json());

  const videos = (vd.items || []).map(normalizeVideo);

  const g = {
    live: [],
    song: [],
    original: [],
    clip: [],
    short: []
  };

  videos.forEach(v => {

    if(isClip(v)) return g.clip.push(v);
    if(isSong(v)) return g.song.push(v);
    if(isOriginal(v)) return g.original.push(v);
    if(isLive(v)) return g.live.push(v);
    if(isShort(v)) return g.short.push(v);

  });

  const render = a => a.map(v => `
    <div class="thumb">
      <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
      <div>${v.title}</div>
    </div>
  `).join("");

  el.innerHTML = `
    <h3>ライブ（配信アーカイブ）</h3>
    <div class="video-grid">${render(g.live)}</div>

    <h3>歌ってみた</h3>
    <div class="video-grid">${render(g.song)}</div>

    <h3>オリ曲 / 試聴</h3>
    <div class="video-grid">${render(g.original)}</div>

    <h3>切り抜き</h3>
    <div class="video-grid">${render(g.clip)}</div>

    <h3>ショート</h3>
    <div class="video-grid">${render(g.short)}</div>
  `;
}

</script>

</body>
</html>
