<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  margin: 0;
  padding: 20px;
}

/* ヘッダー（固定） */
.header {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 12px;
}

/* メインタブ */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: #fff;
}

/* 動画グリッド */
.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.video {
  font-size: 12px;
}

.video img {
  width: 100%;
  border-radius: 8px;
}

/* ページ */
.pagination {
  margin-top: 10px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.page {
  padding: 4px 8px;
  background: #eee;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

.page.active {
  background: #222;
  color: #fff;
}
</style>
</head>

<body>

<div class="header">甲斐田 晴</div>

<!-- メインタブ（導線順） -->
<div class="tabs">
  <div class="tab" data-tab="archive">アーカイブ</div>
  <div class="tab" data-tab="song">歌枠</div>
  <div class="tab" data-tab="goods">グッズ</div>
  <div class="tab" data-tab="news">お知らせ</div>
</div>

<!-- 動的領域 -->
<div id="app">loading...</div>

<script>

/* =========================
   設定
========================= */
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";
const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const PER_PAGE = 6;

/* =========================
   状態管理
========================= */
let state = {
  tab: "archive",
  page: 1,
  videos: [],
  loadedAll: false
};

/* =========================
   初期化
   - タブ復元
========================= */
function init(){

  const savedTab = localStorage.getItem("tab");

  if(savedTab){
    state.tab = savedTab;
  }

  document.querySelectorAll(".tab").forEach(tabEl => {

    if(tabEl.dataset.tab === state.tab){
      tabEl.classList.add("active");
    }

    tabEl.addEventListener("click", () => {

      state.tab = tabEl.dataset.tab;
      state.page = 1;

      localStorage.setItem("tab", state.tab);

      setActiveTab();
      render();
    });

  });

  setActiveTab();
  render();
}

/* =========================
   タブUI更新（固定構造）
========================= */
function setActiveTab(){

  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("active", t.dataset.tab === state.tab);
  });

}

/* =========================
   メイン描画
========================= */
async function render(){

  const app = document.getElementById("app");

  if(state.tab !== "archive"){
    app.innerHTML = `<div>${state.tab}（準備中）</div>`;
    return;
  }

  app.innerHTML = "loading...";

  const list = await fetchVideos(6);
  const ids = list.map(v => v.snippet.resourceId.videoId);
  const details = await fetchDetails(ids);

  state.videos = details;

  drawVideos();

  // 裏で追加取得
  loadMore();
}

/* =========================
   初期取得（軽量）
========================= */
async function fetchVideos(limit){

  const ch = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
  ).then(r=>r.json());

  const uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

  let all = [];
  let token = "";

  while(true){

    let url =
      `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`;

    if(token) url += `&pageToken=${token}`;

    const res = await fetch(url).then(r=>r.json());

    all = all.concat(res.items || []);

    if(all.length >= limit) break;
    if(!res.nextPageToken) break;

    token = res.nextPageToken;
  }

  return all;
}

/* =========================
   詳細取得
========================= */
async function fetchDetails(ids){

  let all = [];

  for(let i=0;i<ids.length;i+=50){

    const chunk = ids.slice(i,i+50);

    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${chunk.join(",")}&key=${API_KEY}`
    ).then(r=>r.json());

    all = all.concat(res.items || []);
  }

  return all;
}

/* =========================
   裏取得（全展開）
========================= */
async function loadMore(){

  if(state.loadedAll) return;

  const list = await fetchVideos(300);
  const ids = list.map(v => v.snippet.resourceId.videoId);
  const details = await fetchDetails(ids);

  state.videos = dedupe([...state.videos, ...details]);

  state.loadedAll = true;

  drawVideos();
}

/* =========================
   重複削除
========================= */
function dedupe(arr){

  const map = new Map();

  arr.forEach(v=>{
    map.set(v.id, v);
  });

  return [...map.values()];
}

/* =========================
   描画（動画部分のみ更新）
========================= */
function drawVideos(){

  const app = document.getElementById("app");

  const start = (state.page - 1) * PER_PAGE;
  const items = state.videos.slice(start, start + PER_PAGE);

  const total = Math.ceil(state.videos.length / PER_PAGE);

  let pages = "";

  for(let i=1;i<=total;i++){

    const label = (i === total) ? `${i}〜` : i;

    pages += `
      <div class="page ${i===state.page?'active':''}"
           onclick="goPage(${i})">${label}</div>
    `;
  }

  app.innerHTML = `
    <div class="video-grid">
      ${items.map(v=>`
        <div class="video">
          <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
          <div>${v.snippet.title}</div>
        </div>
      `).join("")}
    </div>

    <div class="pagination">${pages}</div>
  `;
}

/* =========================
   ページ切替
========================= */
function goPage(p){
  state.page = p;
  drawVideos();
}

/* =========================
   起動
========================= */
init();

</script>

</body>
</html>
