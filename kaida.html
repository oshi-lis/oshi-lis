<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 8px;
  object-fit: cover;
}

.back {
  display: inline-block;
  margin-top: 20px;
  font-size: 13px;
  color: #666;
  text-decoration: none;
}

/* ★デバッグ表示（スマホ用） */
#debug {
  font-size: 12px;
  background: #111;
  color: #0f0;
  padding: 10px;
  white-space: pre-wrap;
  margin-bottom: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="showTab(event, 'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
    <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
  </div>

  <div id="debug"></div>
  <div class="content" id="content"></div>

  <a href="index.html" class="back">← Back</a>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

/* =========================
   タブ保存
========================= */
function saveTab(t){ localStorage.setItem("tab", t); }
function getTab(){ return localStorage.getItem("tab") || "goods"; }

/* =========================
   時間
========================= */
function parseDuration(d){
  if(!d) return Infinity;
  const m = d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return Infinity;
  return (Number(m[1]||0)*60 + Number(m[2]||0));
}

/* =========================
   正規化
========================= */
function normalizeVideo(v){
  return {
    id: v.id,
    title: (v.snippet?.title || "")
      .normalize("NFKC")
      .toLowerCase()
      .replace(/\s/g, ""),
    duration: parseDuration(v.contentDetails?.duration),
    liveStatus: v.snippet?.liveBroadcastContent || "none"
  };
}

/* =========================
   分類（完全分離）
========================= */
function isClip(v){
  return v.title.includes("切り抜き") || v.title.includes("clip");
}

function isOriginal(v){
  return v.title.includes("オリジナル") || v.title.includes("mv") || v.title.includes("試聴");
}

function isSong(v){
  return v.title.includes("歌ってみた") || v.title.includes("cover");
}

function isLive(v){
  return v.liveStatus === "live" || v.liveStatus === "upcoming";
}

function isShort(v){
  return v.duration <= 60;
}

/* =========================
   UI
========================= */
window.addEventListener("load", ()=>{
  showTab(null, getTab());
});

function showTab(e,type){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  const map=["goods","song","archive","news"];
  const idx = map.indexOf(type);
  if(idx>=0) document.querySelectorAll(".tab")[idx].classList.add("active");

  saveTab(type);

  if(type !== "archive"){
    const data={
      goods:["誕生日グッズ2024","アクリルスタンド"],
      song:["アニソン縛り歌枠","深夜歌枠"],
      news:["新衣装発表","ライブ出演"]
    };

    document.getElementById("content").innerHTML =
      "<ul>" + (data[type]||[]).map(v=>`<li>${v}</li>`).join("") + "</ul>";

    document.getElementById("debug").textContent = "";
    return;
  }

  loadArchive();
}

/* =========================
   アーカイブ
========================= */
async function loadArchive(){

  const el=document.getElementById("content");
  el.innerHTML="loading...";

  const ch=await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
  ).then(r=>r.json());

  const uploads=ch.items[0].contentDetails.relatedPlaylists.uploads;

  const pl=await fetch(
    `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`
  ).then(r=>r.json());

  const ids=pl.items.map(v=>v.snippet.resourceId.videoId).join(",");

  const vd=await fetch(
    `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${ids}&key=${API_KEY}`
  ).then(r=>r.json());

  const videos=vd.items||[];

  const g={
    live:[],
    song:[],
    original:[],
    clip:[],
    short:[]
  };

  videos.forEach(v=>{
    const nv = normalizeVideo(v);

    if(isClip(nv)) return g.clip.push(v);
    if(isOriginal(nv)) return g.original.push(v);
    if(isSong(nv)) return g.song.push(v);
    if(isLive(nv)) return g.live.push(v);
    if(isShort(nv)) return g.short.push(v);
  });

  // ★スマホ表示デバッグ（ここが重要）
  document.getElementById("debug").textContent =
"LIVE:\n" + g.live.map(v=>v.snippet.title).join("\n") + "\n\n" +
"CLIP:\n" + g.clip.map(v=>v.snippet.title).join("\n") + "\n\n" +
"SONG:\n" + g.song.map(v=>v.snippet.title).join("\n") + "\n\n" +
"ORIGINAL:\n" + g.original.map(v=>v.snippet.title).join("\n") + "\n\n" +
"SHORT:\n" + g.short.map(v=>v.snippet.title).join("\n");

  const render=a=>a.map(v=>`
    <div class="thumb">
      <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
      <div>${v.snippet.title}</div>
    </div>
  `).join("");

  el.innerHTML=`
    <h3>ライブ</h3>
    <div class="video-grid">${render(g.live)}</div>

    <h3>歌ってみた</h3>
    <div class="video-grid">${render(g.song)}</div>

    <h3>オリ曲 / 試聴</h3>
    <div class="video-grid">${render(g.original)}</div>

    <h3>切り抜き</h3>
    <div class="video-grid">${render(g.clip)}</div>

    <h3>ショート</h3>
    <div class="video-grid">${render(g.short)}</div>
  `;
}

</script>

</body>
</html>
