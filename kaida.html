<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

.icon {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.tab.active {
  background: #222;
  color: #fff;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  border-radius: 8px;
}

.thumb a {
  color: #222;
  text-decoration: none;
  font-size: 12px;
}

.thumb a:hover {
  text-decoration: underline;
}

.back {
  display: inline-block;
  margin-top: 20px;
  font-size: 13px;
  color: #666;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png" class="icon">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="showTab(event,'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event,'song')">歌枠</div>
    <div class="tab" onclick="showTab(event,'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event,'news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

  <a href="index.html" class="back">← Back</a>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

const data = {
  goods: ["誕生日グッズ2024","アクリルスタンド"],
  song: ["アニソン縛り歌枠","深夜歌枠"],
  news: ["新衣装発表","ライブ出演"]
};

const seen = new Set();

/* ===== タブ ===== */
function showTab(e, type){

  document.querySelectorAll(".tab").forEach(tab=>{
    tab.classList.remove("active");
  });
  e.target.classList.add("active");

  localStorage.setItem("activeTab", type);

  const el = document.getElementById("content");

  if(type === "archive"){
    load();
    return;
  }

  el.innerHTML =
    "<ul>" +
    (data[type]||[]).map(v=>`<li>${v}</li>`).join("") +
    "</ul>";
}

/* ===== duration ===== */
function parseDuration(d){
  if(!d) return 0;
  const h=d.match(/(\d+)H/);
  const m=d.match(/(\d+)M/);
  const s=d.match(/(\d+)S/);
  return (Number(h?.[1]||0)*3600)+(Number(m?.[1]||0)*60)+Number(s?.[1]||0);
}

/* ===== 全取得 ===== */
async function getAllVideos(limit = 100){

  const ch = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
  ).then(r=>r.json());

  const uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

  let all = [];
  let token = "";

  while(true){

    let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`;
    if(token) url += `&pageToken=${token}`;

    const res = await fetch(url).then(r=>r.json());

    all = all.concat(res.items || []);

    if(all.length >= limit) break;
    if(!res.nextPageToken) break;

    token = res.nextPageToken;
  }

  return all;
}

/* ===== 詳細 ===== */
async function getDetails(ids){

  let all = [];

  for(let i=0;i<ids.length;i+=50){
    const chunk = ids.slice(i,i+50);

    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${chunk.join(",")}&key=${API_KEY}`
    ).then(r=>r.json());

    all = all.concat(res.items || []);
  }

  return all;
}

/* ===== メイン ===== */
async function load(){

  const el = document.getElementById("content");
  el.innerHTML = "loading...";

  try{

    const list = await getAllVideos(100);
    const ids = list.map(v=>v.snippet.resourceId.videoId);
    let videos = await getDetails(ids);

    let g = {live:[], song:[], original:[], clip:[], short:[]};

    const classify = (arr)=>{
      arr.forEach(v=>{

        const id = v.id;
        if(seen.has(id)) return;
        seen.add(id);

        const title = v.snippet.title || "";
        const sec = parseDuration(v.contentDetails.duration);

        if(title.includes("切り抜き")) return g.clip.push(v);
        if(title.includes("オリジナル") || title.includes("試聴")) return g.original.push(v);
        if(title.includes("歌ってみた")) return g.song.push(v);
        if(title.includes("配信") || title.includes("雑談") || sec >= 1800) return g.live.push(v);
        if(sec > 0 && sec <= 60) return g.short.push(v);
      });
    };

    classify(videos);

    if(g.song.length < 12 || g.original.length < 12){

      const extraList = await getAllVideos(300);
      const extraIds = extraList.map(v=>v.snippet.resourceId.videoId);
      const extraVideos = await getDetails(extraIds);

      classify(extraVideos);
    }

    const render = arr => arr.slice(0,6).map(v=>`
      <div class="thumb">
        <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank">
          <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
          <div>${v.snippet.title}</div>
        </a>
      </div>
    `).join("");

    el.innerHTML = `
      <h3>配信アーカイブ</h3><div class="video-grid">${render(g.live)}</div>
      <h3>歌ってみた</h3><div class="video-grid">${render(g.song)}</div>
      <h3>オリ曲</h3><div class="video-grid">${render(g.original)}</div>
      <h3>切り抜き</h3><div class="video-grid">${render(g.clip)}</div>
      <h3>ショート</h3><div class="video-grid">${render(g.short)}</div>
    `;

  }catch(e){
    el.innerHTML = "エラー（APIキー or 通信）";
  }
}

/* ===== タブ復元 ===== */
const saved = localStorage.getItem("activeTab") || "goods";
const target = document.querySelector(`.tab[onclick*="${saved}"]`);
showTab({target}, saved);

</script>

</body>
</html>
