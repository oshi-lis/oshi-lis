<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* 上部 */
.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

/* タブ */
.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

/* 中身 */
.content {
  margin-top: 15px;
}

/* グリッド */
.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

@media (max-width: 600px) {
  .video-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* サムネ */
.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 8px;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* タイトル */
.title {
  margin-top: 4px;
  font-size: 11px;
  line-height: 1.3;
}

.title a {
  text-decoration: none;
  color: #222;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* 戻る */
.back {
  display: inline-block;
  margin-top: 20px;
  font-size: 13px;
  color: #666;
  text-decoration: none;
}
</style>

</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <div class="tab" onclick="showTab(event, 'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
    <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

  <a href="index.html" class="back">← Back</a>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";

/* =========================
   アーカイブ取得（6件確認用）
========================= */
async function loadArchive() {

  // ===== 前：取得処理 =====
  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" +
    encodeURIComponent(
      "https://www.youtube.com/feeds/videos.xml?channel_id=" + CHANNEL_ID
    )
  );

  const json = await res.json();

  // ★ここで確認（重要）
  console.log("取得件数:", json.items?.length);

  // ===== フィルタ処理 =====
  const filtered = (json.items || [])
    .filter(v => v && v.link && !v.link.includes("shorts"));

  console.log("フィルタ後:", filtered.length);

  // ===== 6件に制限 =====
  const videos = filtered.slice(0, 6);

  console.log("最終表示:", videos.length);

  // ===== 表示生成 =====
  const list = videos.map(v =>
    `<div class="video-card">
      <div class="thumb">
        <img src="${v.thumbnail}">
      </div>
      <div class="title">
        <a href="${v.link}" target="_blank">${v.title}</a>
      </div>
    </div>`
  ).join("");

  document.getElementById("content").innerHTML =
    `<div class="video-grid">${list}</div>`;
}

</script>

</body>
</html>
