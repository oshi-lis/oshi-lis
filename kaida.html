<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

.icon {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.tab.active {
  background: #222;
  color: #fff;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.thumb img {
  width: 100%;
  border-radius: 8px;
}

.thumb a {
  color: #222;
  text-decoration: none;
  font-size: 12px;
}

.pagination {
  margin-top: 12px;
  display:flex;
  gap:6px;
  justify-content:center;
  font-size:12px;
}

.page-btn{
  padding:4px 8px;
  background:#eee;
  border-radius:6px;
  cursor:pointer;
}

.page-btn.active{
  background:#222;
  color:#fff;
}

.filters {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.filters button {
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  background: #eee;
  cursor: pointer;
  font-size: 12px;
}

.filters button:hover {
  background: #ddd;
}

.filters button:active {
  background: #222;
  color: #fff;
}
</style>
</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png" class="icon">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="showTab(event,'goods')">グッズ</div>
    <div class="tab" onclick="showTab(event,'song')">歌枠</div>
    <div class="tab" onclick="showTab(event,'archive')">アーカイブ</div>
    <div class="tab" onclick="showTab(event,'news')">お知らせ</div>
  </div>

  <div class="content" id="content">読み込み中...</div>

</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

let cache = {
  videos: [],
  videoMap: {},
  lastUpdated: 0
};
const data = {
  goods: ["誕生日グッズ2024","アクリルスタンド"],
  song: ["アニソン縛り歌枠","深夜歌枠"],
  news: ["新衣装発表","ライブ出演"]
};

let videos = [];
let currentPage = 1;
const perPage = 6;
let currentFilter = "all";
/* ===== タブ ===== */
function showTab(e,type){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  e.target.classList.add("active");

  localStorage.setItem("activeTab", type);

  const el = document.getElementById("content");

  if(type !== "archive"){
    el.innerHTML =
      "<ul>" +
      (data[type]||[]).map(v=>`<li>${v}</li>`).join("") +
      "</ul>";
    return;
  }

  loadArchive();
}

/* ===== API安全取得 ===== */
async function getAllVideos(){

  try {
    const ch = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
    ).then(r=>r.json());

    const uploads = ch.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;

    if(!uploads){
      throw new Error("uploads not found");
    }

    let all = [];
let token = "";

while(true){

  let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`;
  if(token) url += `&pageToken=${token}`;

  const res = await fetch(url).then(r=>r.json());

  all = all.concat(res.items || []);

  if(!res.nextPageToken) break;
  token = res.nextPageToken;
}
    return all;

  } catch (e) {
    return [];
  }
}

/* ===== video詳細（安全版） ===== */
async function getDetails(ids){

  try {

    const clean = (ids || []).filter(Boolean);

    if(clean.length === 0){
     
      return [];
    }

    let all = [];

    for(let i=0;i<clean.length;i+=50){

      const chunk = clean.slice(i,i+50);


      const url =
        `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${chunk.join(",")}&key=${API_KEY}`;

      const res = await fetch(url);
      const data = await res.json();


      all = all.concat(data.items || []);
    }

    return all;

  } catch (e) {
    return [];
  }
/* ===== キャッシュ更新 ===== */
}
function shouldUpdate(){
  const ONE_DAY = 1000 * 60 * 60 * 24;
  return (Date.now() - cache.lastUpdated) > ONE_DAY;
}
/* ===== アーカイブ ===== */
async function loadArchive(){

  const el = document.getElementById("content");

  // キャッシュがあって、1日以内ならそれ使う
  if(cache.videos.length > 0 && !shouldUpdate()){
  el.innerHTML = "キャッシュ表示中";
  setTimeout(() => {
    videos = cache.videos;
    currentPage = 1;
    render();
  }, 500);
  return;
}

  el.innerHTML = "loading...";

  const list = await getAllVideos();

console.log("STEP1 list length:", list.length);
console.log("STEP1 first item:", list[0]);

  const ids = list
    .map(v => v?.snippet?.resourceId?.videoId)
    .filter(Boolean);

console.log("STEP2 ids length:", ids.length);

  const newVideos = await getDetails(ids);

console.log("STEP3 videos length:", newVideos.length);

  if(newVideos.length === 0){
    el.innerHTML = "取得失敗";
    return;
  }

  // キャッシュ保存
  cache.videos = newVideos;
  cache.lastUpdated = Date.now();

  cache.videoMap = {};
  newVideos.forEach(v => {
    cache.videoMap[v.id] = v;
  });

  videos = newVideos;

videos.forEach(v => {
  if ((v.snippet?.title || "").toLowerCase().includes("covered by")) {
  }
});

currentPage = 1;
render();
}

/* ===== 描画 ===== */
function render(){
  console.log("STEP1 render動いた");
if(!currentFilter) currentFilter = "all";

  const el = document.getElementById("content");
const groups = {
  live: [],
  song: [],
  original: [],
  clip: [],
  short: []
};

videos.forEach(v => {
  const title = (v.snippet?.title || "").toLowerCase();

  // ① 歌（最優先）
  if (
  (
    title.includes("歌ってみた") ||
    title.includes("歌みた") ||
    title.includes("cover") ||
    title.includes("covered by") ||
    title.includes("カバー")
  )
  &&
  !title.includes("歌枠") &&
  !title.includes("配信") 
) return groups.song.push(v);

  // ② 切り抜き
  if(title.includes("切り抜き")) return groups.clip.push(v);

  // ③ オリジナル
  if(title.includes("オリジナル") || title.includes("mv"))
    return groups.original.push(v);

  // ④ ショート
  if(title.includes("short"))
    return groups.short.push(v);

  // ⑤ それ以外
  return groups.live.push(v);
});
  const start = (currentPage - 1) * perPage;
 let list = videos;

if(currentFilter && currentFilter !== "all"){
  list = groups[currentFilter];
}

const targetList = list;

const pageItems = list.slice(start, start + perPage);
const total = Math.ceil(targetList.length / perPage);

  el.innerHTML = `
  <div class="filters">
    <button onclick="setFilter('all')">配信アーカイブ</button>
    <button onclick="setFilter('original')">オリジナル曲</button>
    <button onclick="setFilter('song')">歌ってみた</button>
    <button onclick="setFilter('clip')">切り抜き</button>
    <button onclick="setFilter('short')">ショート</button>
  </div>

  <div class="video-grid">
    ${pageItems.map(v => `
      <div class="thumb">
        <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank">
          <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
          <div>${v.snippet?.title || "no title"}</div>
        </a>
      </div>
    `).join("")}
  </div>

  <div class="pagination">
    ${Array.from({length: total}, (_, i) => `
      <div class="page-btn ${i + 1 === currentPage ? 'active' : ''}"
        onclick="go(${i + 1})">${i + 1}</div>
    `).join("")}
  </div>
`;
}
/* ===== 動作の切り替え ===== */
function setFilter(type){
  currentFilter = type;
  currentPage = 1;
  render();
}
/* ===== ページ ===== */
function go(p){
  currentPage = p;
  render();
}

/* ===== 初期 ===== */
const saved = localStorage.getItem("activeTab") || "goods";
const target = document.querySelector(`.tab[onclick*="${saved}"]`);

showTab({target}, saved);

/* ===== 手動更新 ===== */
async function forceUpdate(){

  const el = document.getElementById("content");
  el.innerHTML = "更新中...";

  const list = await getAllVideos();

  const ids = list
    .map(v => v?.snippet?.resourceId?.videoId)
    .filter(Boolean);

  const newVideos = await getDetails(ids);

  cache.videos = newVideos;
  cache.lastUpdated = Date.now();

  cache.videoMap = {};
  newVideos.forEach(v => {
    cache.videoMap[v.id] = v;
  });

  videos = newVideos;
  currentPage = 1;
  render();
}

</script>

</body>
</html>
