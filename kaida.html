<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>アーカイブ</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  margin: 0;
  padding: 0;
}

/* ===== UI ===== */
.header {
  text-align: center;
  padding: 20px;
  background: white;
}

.header img {
  width: 80px;
  height: 80px;
  border-radius: 16px;
}

.desc {
  font-size: 12px;
  color: #666;
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  background: white;
  padding: 10px;
  border-top: 1px solid #eee;
}

.tab {
  padding: 6px 12px;
  background: #eee;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  padding: 20px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
</style>
</head>

<body>

<div class="header">
  <img src="images/kaida.png">
  <div class="desc">(グッズ)(アーカイブ)(歌枠)(お知らせ)</div>
</div>

<div class="tabs">
  <div class="tab" data-tab="archive">アーカイブ</div>
  <div class="tab" data-tab="goods">グッズ</div>
  <div class="tab" data-tab="live">歌枠</div>
  <div class="tab" data-tab="info">お知らせ</div>
</div>

<div class="content" id="content">loading...</div>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "YOUR_API_KEY";

/* =========================
   タブ管理
========================= */

window.addEventListener("load", () => {
  const tab = localStorage.getItem("activeTab") || "archive";
  loadTab(tab);
});

function loadTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add("active");

  if (tab === "archive") loadArchive();
}

/* =========================
   秒変換（重複完全削除）
========================= */

function parseDuration(d) {
  if (!d) return 0;
  const m = d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (Number(m[1] || 0) * 60) + Number(m[2] || 0);
}

/* =========================
   判定ロジック（最終安定版）
========================= */

/* ライブ */
function isLive(v) {
  const title = (v.snippet?.title || "").toLowerCase();
  const sec = parseDuration(v.contentDetails?.duration);

  return (
    title.includes("配信") ||
    title.includes("ライブ") ||
    title.includes("live") ||
    title.includes("歌枠") ||
    title.includes("雑談") ||
    sec >= 3600
  );
}

/* ショート */
function isShort(v) {
  const title = (v.snippet?.title || "").toLowerCase();
  const sec = parseDuration(v.contentDetails?.duration);

  const isLiveLike =
    title.includes("配信") ||
    title.includes("ライブ") ||
    title.includes("live") ||
    title.includes("歌枠") ||
    title.includes("雑談");

  return sec > 0 && sec <= 60 && !isLiveLike;
}

/* オリ曲 / 試聴 */
function isOriginal(v) {
  const title = (v.snippet?.title || "").toLowerCase();
  return (
    title.includes("オリジナル") ||
    title.includes("mv") ||
    title.includes("試聴")
  );
}

/* 切り抜き */
function isClip(v) {
  return (v.snippet?.title || "").toLowerCase().includes("切り抜き");
}

/* =========================
   アーカイブ取得
========================= */

async function loadArchive() {

  const el = document.getElementById("content");

  try {

    el.innerHTML = "loading...";

    const ch = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
    ).then(r => r.json());

    const uploads =
      ch?.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;

    const pl = await fetch(
      `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`
    ).then(r => r.json());

    const ids = (pl.items || [])
      .map(v => v?.snippet?.resourceId?.videoId)
      .filter(Boolean)
      .join(",");

    const vd = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${ids}&key=${API_KEY}`
    ).then(r => r.json());

    const videos = vd.items || [];

    const groups = {
      live: [],
      song: [],
      original: [],
      clip: [],
      short: []
    };

    videos.forEach(v => {

      const title = (v.snippet?.title || "").toLowerCase();

      if (isShort(v)) return groups.short.push(v);
      if (isLive(v)) return groups.live.push(v);

      if (isClip(v)) return groups.clip.push(v);

      if (title.includes("歌ってみた")) return groups.song.push(v);

      if (isOriginal(v)) return groups.original.push(v);

      groups.original.push(v);
    });

    const html = (v) => `
      <div>
        <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg"
             style="width:100%;border-radius:8px;">
      </div>
    `;

    el.innerHTML = `
      <h3>ライブ</h3>
      <div class="video-grid">${groups.live.map(html).join("")}</div>

      <h3>歌ってみた</h3>
      <div class="video-grid">${groups.song.map(html).join("")}</div>

      <h3>オリ曲 / 試聴</h3>
      <div class="video-grid">${groups.original.map(html).join("")}</div>

      <h3>切り抜き</h3>
      <div class="video-grid">${groups.clip.map(html).join("")}</div>

      <h3>ショート</h3>
      <div class="video-grid">${groups.short.map(html).join("")}</div>
    `;

  } catch (e) {
    console.error(e);
    el.innerHTML = "読み込み失敗（API or データエラー）";
  }
}

</script>

</body>
</html>
