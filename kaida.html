<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田　晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  margin: 0;
  padding: 0;
  color: #222;
}

/* UIそのまま */
.header {
  text-align: center;
  padding: 20px;
  background: white;
}

.header img {
  width: 80px;
  height: 80px;
  border-radius: 16px;
}

.desc {
  font-size: 12px;
  color: #666;
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  background: white;
  padding: 10px;
  border-top: 1px solid #eee;
}

.tab {
  padding: 6px 12px;
  background: #eee;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  padding: 20px;
}

.back {
  display: inline-block;
  margin: 10px 20px;
  font-size: 13px;
  color: #666;
  text-decoration: none;
}

</style>
</head>

<body>

<!-- UIそのまま -->
<div class="header">
  <img src="images/kaida.png">
  <div class="desc">(グッズ)(アーカイブ)(歌枠)(お知らせ)</div>
</div>

<div class="tabs">
  <div class="tab" onclick="showTab(event, 'goods')">グッズ</div>
  <div class="tab" onclick="showTab(event, 'song')">歌枠</div>
  <div class="tab" onclick="showTab(event, 'archive')">アーカイブ</div>
  <div class="tab" onclick="showTab(event, 'news')">お知らせ</div>
</div>

<div class="content" id="content"></div>

<a href="index.html" class="back">← Back</a>

<script>

const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

/* =====================
   UIデータ
===================== */
const data = {
  goods: [
    "誕生日グッズ2024",
    "アクリルスタンド"
  ],
  song: [
    "アニソン縛り歌枠",
    "深夜歌枠"
  ],
  news: [
    "新衣装発表",
    "ライブ出演"
  ]
};

/* =====================
   タブ復元
===================== */
window.addEventListener("load", () => {
  const saved = localStorage.getItem("activeTab") || "goods";
  showTab(null, saved);
});

/* =====================
   タブ処理
===================== */
function showTab(e, type) {

  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.remove("active");
  });

  const tabs = document.querySelectorAll(".tab");
  const map = { goods: 0, song: 1, archive: 2, news: 3 };
  tabs[map[type]]?.classList.add("active");

  localStorage.setItem("activeTab", type);

  const content = document.getElementById("content");

  if (type !== "archive") {
    content.innerHTML =
      "<ul>" +
      data[type].map(v => `<li>${v}</li>`).join("") +
      "</ul>";
  } else {
    loadArchive();
  }
}

/* =====================
   YouTube判定
===================== */

function parseDuration(d) {
  if (!d) return 0;
  const m = d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (Number(m[1] || 0) * 60) + Number(m[2] || 0);
}

function isShort(v) {
  return parseDuration(v.contentDetails?.duration) <= 60;
}

function isLive(v) {
  const sec = parseDuration(v.contentDetails?.duration);
  const t = (v.snippet?.title || "").toLowerCase();
  return sec >= 3600 || t.includes("配信") || t.includes("ライブ") || t.includes("live");
}

function isClip(v) {
  return (v.snippet?.title || "").includes("切り抜き");
}

function isSong(v) {
  return (v.snippet?.title || "").includes("歌ってみた");
}

function isOriginal(v) {
  const t = (v.snippet?.title || "").toLowerCase();
  return t.includes("オリジナル") || t.includes("mv") || t.includes("試聴");
}

/* =====================
   アーカイブ
===================== */

async function loadArchive() {

  const el = document.getElementById("content");

  try {
    el.innerHTML = "loading...";

    const ch = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
    ).then(r => r.json());

    const uploads =
      ch?.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;

    const pl = await fetch(
      `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`
    ).then(r => r.json());

    const ids = (pl.items || [])
      .map(v => v?.snippet?.resourceId?.videoId)
      .filter(Boolean)
      .join(",");

    const vd = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${ids}&key=${API_KEY}`
    ).then(r => r.json());

    const videos = vd.items || [];

    const groups = {
      live: [],
      song: [],
      original: [],
      clip: [],
      short: []
    };

    videos.forEach(v => {

      if (isShort(v)) return groups.short.push(v);
      if (isLive(v)) return groups.live.push(v);
      if (isSong(v)) return groups.song.push(v);
      if (isClip(v)) return groups.clip.push(v);
      if (isOriginal(v)) return groups.original.push(v);

    });

    const render = (arr) =>
      arr.map(v => `<li>${v.snippet?.title || ""}</li>`).join("");

    el.innerHTML = `
      <ul>
        <b>ライブ</b><br>${render(groups.live)}<br><br>

        <b>歌ってみた</b><br>${render(groups.song)}<br><br>

        <b>オリ曲 / 試聴</b><br>${render(groups.original)}<br><br>

        <b>切り抜き</b><br>${render(groups.clip)}<br><br>

        <b>ショート</b><br>${render(groups.short)}
      </ul>
    `;

  } catch (e) {
    console.error(e);
    el.innerHTML = "読み込み失敗";
  }
}

</script>

</body>
</html>
