<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 16px;
  object-fit: cover;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.content ul {
  padding-left: 18px;
}

.content li {
  margin-bottom: 6px;
}

/* pagination */
.pagination {
  margin-top: 12px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.page {
  padding: 4px 8px;
  background: #eee;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}

.page.active {
  background: #222;
  color: white;
}
</style>

</head>

<body>

<div class="card">

  <div class="top">
    <img src="images/kaida.png">
    <div>
      <div class="name">甲斐田 晴</div>
      <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="switchTab('archive')">アーカイブ</div>
    <div class="tab" onclick="switchTab('song')">歌枠</div>
    <div class="tab" onclick="switchTab('goods')">グッズ</div>
    <div class="tab" onclick="switchTab('news')">お知らせ</div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";
const CHANNEL_ID = "UCo2N7C-Z91waaR6fL3LL_jw";

let state = {
  tab: "archive",
  page: 1,
  videos: {
    normal: [],
    song: [],
    original: [],
    shorts: []
  }
};

window.onload = () => {
  const saved = localStorage.getItem("tab") || "archive";
  switchTab(saved);
};

function setActiveTab(tab){
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => {
    if(t.textContent.includes(
      tab === "archive" ? "アーカイブ" :
      tab === "song" ? "歌枠" :
      tab === "goods" ? "グッズ" : "お知らせ"
    )){
      t.classList.add("active");
    }
  });
}

async function switchTab(tab){

  state.tab = tab;
  state.page = 1;

  localStorage.setItem("tab", tab);

  setActiveTab(tab);

  const content = document.getElementById("content");

  if(tab !== "archive"){
    content.innerHTML = "<ul>" +
      (tabData(tab)).map(v => `<li>${v}</li>`).join("") +
      "</ul>";
    return;
  }

  content.innerHTML = "loading...";

  const items = await fetchVideos();
  state.videos = classify(items);

  renderArchive();
}

function tabData(tab){
  return {
    song: ["歌枠1", "歌枠2"],
    goods: ["グッズ1", "グッズ2"],
    news: ["お知らせ1", "お知らせ2"]
  }[tab] || [];
}

async function fetchVideos(){

  const ch = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
  ).then(r => r.json());

  const uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${uploads}&key=${API_KEY}`
  ).then(r => r.json());

  return res.items || [];
}

function classify(items){

  return {
    normal: items.filter(v =>
      !isShort(v) && !isSong(v) && !isOriginal(v)
    ),

    song: items.filter(v => isSong(v)),
    original: items.filter(v => isOriginal(v)),
    shorts: items.filter(v => isShort(v))
  };
}

function isShort(v){
  return /short/i.test(v.snippet.title);
}

function isSong(v){
  return /歌|cover|sing/i.test(v.snippet.title);
}

function isOriginal(v){
  return /オリジナル|original/i.test(v.snippet.title);
}

function renderArchive(){

  const PER_PAGE = 6;
  const list = state.videos.normal;

  const start = (state.page - 1) * PER_PAGE;
  const items = list.slice(start, start + PER_PAGE);

  const total = Math.ceil(list.length / PER_PAGE);

  let pages = "";

  for(let i = 1; i <= total; i++){
    const label = (i === total) ? `${i}〜` : i;
    pages += `<span class="page ${i===state.page?'active':''}" onclick="goPage(${i})">${label}</span>`;
  }

  document.getElementById("content").innerHTML = `
    <ul>
      ${items.map(v => `<li>${v.snippet.title}</li>`).join("")}
    </ul>
    <div class="pagination">${pages}</div>
  `;
}

function goPage(p){
  state.page = p;
  renderArchive();
}

</script>

</body>
</html>
