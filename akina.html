<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>甲斐田 晴</title>

<style>
body {
  font-family: sans-serif;
  background: #f6f7fb;
  margin: 0;
  padding: 20px;
  color: #222;
}

.card {
  max-width: 800px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  gap: 16px;
  align-items: center;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.tab {
  padding: 6px 10px;
  background: #eee;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.tab.active {
  background: #222;
  color: white;
}

.content {
  margin-top: 15px;
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.video img {
  width: 100%;
  border-radius: 8px;
}

.pagination {
  margin-top: 10px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.page {
  padding: 4px 8px;
  background: #eee;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

.page.active {
  background: #222;
  color: white;
}
</style>

</head>

<body>

<div class="card">

  <div class="top">
    <div class="name">甲斐田 晴</div>
  </div>

  <!-- タブ（確定順） -->
  <div class="tabs">
    <div class="tab" data-tab="archive">アーカイブ</div>
    <div class="tab" data-tab="song">歌枠</div>
    <div class="tab" data-tab="goods">グッズ</div>
    <div class="tab" data-tab="news">お知らせ</div>
  </div>

  <div class="content" id="content">loading...</div>

</div>

<script>

const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";
const CHANNEL_ID = "UCo2N7C-Z91waaR6lF3LL_jw";

const PER_PAGE = 6;

let state = {
  tab: "archive",
  page: 1,
  videos: [],
  loadedAll: false
};

/* =====================
   タブ状態復元
===================== */
function init(){

  const saved = localStorage.getItem("tab");
  if(saved) state.tab = saved;

  document.querySelectorAll(".tab").forEach(t => {

    if(t.dataset.tab === state.tab){
      t.classList.add("active");
    }

    t.onclick = () => {

      state.tab = t.dataset.tab;
      state.page = 1;

      localStorage.setItem("tab", state.tab);

      setActiveTab();
      render();
    };
  });

  setActiveTab();
  render();
}

/* =====================
   タブUI更新
===================== */
function setActiveTab(){
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === state.tab);
  });
}

/* =====================
   メイン描画
===================== */
async function render(){

  const content = document.getElementById("content");

  if(state.tab !== "archive"){
    content.innerHTML = `<div>${state.tab}（準備中）</div>`;
    return;
  }

  content.innerHTML = "loading...";

  const list = await fetchVideos(6);
  const ids = list.map(v => v.snippet.resourceId.videoId);
  const details = await fetchDetails(ids);

  state.videos = details;

  draw();

  loadMore();
}

/* =====================
   初期取得
===================== */
async function fetchVideos(limit){

  const ch = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
  ).then(r => r.json());

  const uploads = ch.items[0].contentDetails.relatedPlaylists.uploads;

  let all = [];
  let token = "";

  while(true){

    let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploads}&maxResults=50&key=${API_KEY}`;

    if(token) url += `&pageToken=${token}`;

    const res = await fetch(url).then(r => r.json());

    all = all.concat(res.items || []);

    if(all.length >= limit) break;
    if(!res.nextPageToken) break;

    token = res.nextPageToken;
  }

  return all;
}

/* =====================
   詳細取得
===================== */
async function fetchDetails(ids){

  let all = [];

  for(let i=0;i<ids.length;i+=50){

    const chunk = ids.slice(i,i+50);

    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${chunk.join(",")}&key=${API_KEY}`
    ).then(r => r.json());

    all = all.concat(res.items || []);
  }

  return all;
}

/* =====================
   裏取得
===================== */
async function loadMore(){

  if(state.loadedAll) return;

  const list = await fetchVideos(300);
  const ids = list.map(v => v.snippet.resourceId.videoId);
  const details = await fetchDetails(ids);

  state.videos = dedupe([...state.videos, ...details]);

  state.loadedAll = true;

  draw();
}

/* =====================
   重複削除
===================== */
function dedupe(arr){

  const map = new Map();
  arr.forEach(v => map.set(v.id, v));
  return [...map.values()];
}

/* =====================
   描画
===================== */
function draw(){

  const content = document.getElementById("content");

  const start = (state.page - 1) * PER_PAGE;
  const items = state.videos.slice(start, start + PER_PAGE);

  const total = Math.ceil(state.videos.length / PER_PAGE);

  let pages = "";

  for(let i=1;i<=total;i++){
    const label = (i === total) ? `${i}〜` : i;
    pages += `<span class="page ${i===state.page?'active':''}" onclick="go(${i})">${label}</span>`;
  }

  content.innerHTML = `
    <div class="video-grid">
      ${items.map(v => `
        <div class="video">
          <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
          <div>${v.snippet.title}</div>
        </div>
      `).join("")}
    </div>

    <div class="pagination">${pages}</div>
  `;
}

/* =====================
   ページ移動
===================== */
function go(p){
  state.page = p;
  draw();
}

init();

</script>

</body>
</html>
