<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>推しポータル</title>

<style>
body {
  font-family: sans-serif;
  background: #f4f5f7;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 26px;
}

/* カード */
.card {
  display: flex;
  align-items: center;
  background: white;
  margin: 12px 0;
  padding: 14px 16px;
  border-radius: 14px;
  text-decoration: none;
  color: black;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  transition: 0.2s;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: scale(1.02);
}

/* 左グラデ */
.card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 6px;
  height: 100%;
}

.kaida::before {
  background: linear-gradient(180deg, #4DD7E3, #2bb3c4);
}

.saegusa::before {
  background: linear-gradient(180deg, #F03C31, #c81e1e);
}

/* 画像 */
.card img {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
  margin-right: 15px;
  border: 1px solid #eee;
  background: #ddd;
}

/* テキスト */
.name {
  font-size: 18px;
  font-weight: bold;
}

.desc {
  font-size: 12px;
  color: #666;
  margin-top: 2px;
}
</style>

</head>

<body>

<div class="container">

<h1>推しポータル</h1>
