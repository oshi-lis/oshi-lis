<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>推しポータル</title>

<style>
body {
  font-family: sans-serif;
  background: #f4f5f7;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 26px;
}

/* カード */
.card {
  display: flex;
  align-items: center;
  background: white;
  margin: 12px 0;
  padding: 14px 16px;
  border-radius: 14px;
  text-decoration: none;
  color: black;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  transition: 0.2s;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: scale(1.02);
}

/* 左グラデ */
.card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 6px;
  height: 100%;
}

.kaida::before {
  background: linear-gradient(180deg, #4DD7E3, #2bb3c4);
}

.saegusa::before {
  background: linear-gradient(180deg, #F03C31, #c81e1e);
}

/* 画像 */
.card img {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
  margin-right: 15px;
  border: 1px solid #eee;
  background: #ddd;
}

/* テキスト */
.name {
  font-size: 18px;
  font-weight: bold;
}

.desc {
  font-size: 12px;
  color: #666;
  margin-top: 2px;
}
</style>

</head>

<body>

<div class="container">

<h1>推しポータル</h1>

<!-- 甲斐田 -->
<a class="card kaida" href="oshi-kaida.html">
  <img id="kaida-icon" src="https://placehold.co/80x80">
  <div>
    <div class="name">甲斐田 晴</div>
    <div class="desc">歌・雑談・ゲーム配信</div>
  </div>
</a>

<!-- 三枝 -->
<a class="card saegusa" href="oshi-saegusa.html">
  <img id="saegusa-icon" src="https://placehold.co/80x80">
  <div>
    <div class="name">三枝 明那</div>
    <div class="desc">歌枠・ライブ・雑談</div>
  </div>
</a>

</div>

<script>
const API_KEY = "AIzaSyDNqDI1bIEQpWahutCP_w3QpLoQvdcde78";

const kaidaID = "UCo2N7C-Z91waaR6lF3LL_jw";
const saegusaID = "UCOWcZ18VTiKq9xKSTnFj4eg";

function fetchIcon(channelId, imgId) {
  fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${channelId}&key=${API_KEY}`)
    .then(res => res.json())
    .then(data => {

      console.log("APIレスポンス:", data);

      if (!data.items || data.items.length === 0) {
        console.log("❌ itemsなし:", channelId);
        document.getElementById(imgId).src = "https://placehold.co/80x80";
        return;
      }

      const url = data.items[0].snippet?.thumbnails?.medium?.url;

      if (!url) {
        console.log("❌ URLなし:", data);
        document.getElementById(imgId).src = "https://placehold.co/80x80";
        return;
      }

      document.getElementById(imgId).src = url;
    })
    .catch(err => {
      console.log("通信エラー:", err);
      document.getElementById(imgId).src = "https://placehold.co/80x80";
    });
}

fetchIcon(kaidaID, "kaida-icon");
fetchIcon(saegusaID, "saegusa-icon");
</script>

</body>
</html>
