<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>推しポータル</title>

<style>
body {
  font-family: sans-serif;
  background: #f4f5f7;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}

/* タイトル */
h1 {
  text-align: center;
  font-size: 26px;
  margin-top: 20px;
}

/* タブ */
.tabs {
  display: flex;
  gap: 10px;
  margin: 15px 0;
  flex-wrap: wrap;
}

.tab {
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 13px;
  background: #ddd;
}

.tab.blue {
  background: #4DD7E3;
  color: white;
}

.tab.red {
  background: #F03C31;
  color: white;
}

.tab.gray {
  background: #666;
  color: white;
}

/* カード */
.card {
  display: flex;
  align-items: center;
  background: white;
  margin: 10px 0;
  padding: 14px;
  border-radius: 14px;
  text-decoration: none;
  color: black;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  position: relative;
  overflow: hidden;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

/* 左ライン */
.line {
  width: 6px;
  height: 100%;
  position: absolute;
  left: 0;
  top: 0;
}

.blue-line {
  background: linear-gradient(180deg,#4DD7E3,#2bb3c4);
}

  background: linear-gradient(180deg,#F03
