<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>推しリスト</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f7fb;
  margin: 0;
  padding: 0;
  color: #222;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 20px;
}
@media (max-width: 600px) {
  .name {
    color: #2bb3c4;
  }

  .name:active {
    opacity: 0.6;
  }
}

h1 {
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  margin: 20px 0 30px;
  letter-spacing: 1px;
}

/* カード一覧 */
.list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 16px;
}

/* カード */
.card {
  display: flex;
  align-items: flex-start;
  background: #ffffff;
  padding: 20px;
  margin: 0;
  border-radius: 18px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.05);

  width: 100%;
  box-sizing: border-box;

  position: relative;   
  overflow: hidden;  
}

/* 左ライン */
.line {
  width: 10px;          /* ←太くする */
  position: absolute;

  left: 0;              /* ←外側ぴったり */
  top: 0;
  bottom: 0;

  border-radius: 6px 0 0 6px; /* ←左だけ丸くして馴染ませる */
}

/* アイコン */
.card > img {
  width: 72px;
  height: 72px;
  border-radius: 16px;
  object-fit: cover;
  margin-right: 16px;

  border: 2px solid rgba(0,0,0,0.08);
}

/* 右側 */
.content {
  display: flex;
  flex-direction: column;
  flex: 1;
}

.name {
  font-weight: bold;
  font-size: 16px;
  color: #222;
  cursor: default;
}
.desc {
  font-size: 12px;
  color: #666;
  margin-top: 4px;
}

/* ボタン */
.links {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 12px;
  color: white;
  display: inline-block;
  text-decoration: none;
  transition: transform 0.1s ease, filter 0.2s ease;
}

.btn:hover {
  filter: brightness(1.1);
}

.btn:active {
  transform: scale(0.95);
}

.yt { background: #FF0000; }
.x { background: #000; }

.gray {
  background: #9a9a9a !important;
  color: white;
}
.sns-icon {
  width: 22px;
  height: 22px;
  object-fit: contain;
  display: inline-block;
  transition: transform 0.15s ease;
}

.sns-icon:hover {
  transform: scale(1.1);
}
.icon-text {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  width: 22px;
  height: 22px;

  font-size: 14px;
  text-decoration: none;
}
a[href*="x.com"] .sns-icon {
  width: 20px;
  height: 20px;
}
.card {
  position: relative;
  overflow: hidden;
}
.blue {
  background: linear-gradient(180deg,#4DD7E3,#2bb3c4);
}

.red {
  background: linear-gradient(180deg,#F03C31,#c81e1e);
}
</style>

</head>

<body>

<div class="container">

<h1>推しリスト</h1>

<div class="list">

<!-- 甲斐田 -->
<div class="card">
  <div class="line blue"></div>

  <img src="images/kaida.png">

  <div class="content">
    <span class="name">甲斐田 晴</a>
    <div class="desc">歌・雑談・ゲーム配信</div>

<div class="links">

  <a href="https://youtube.com/@kaidaharu?si=3G23BTulBI6Sx9iv" target="_blank">
    <img class="sns-icon" src="images/youtube.svg" alt="YouTube">
  </a>

  <a href="https://x.com/Kaida_Haru" target="_blank">
    <img class="sns-icon" src="images/x.svg" alt="X">
  </a>

  <div class="btn gray">コンテンツ</div>

</div>
  </div>
</div>

<!-- 明那 -->
<div class="card">
  <div class="line red"></div>

  <img src="images/akina.png">

  <div class="content">
    <span class="name">三枝 明那</a>
    <div class="desc">歌・雑談・ゲーム配信</div>

<div class="links">

  <a href="https://youtube.com/@saegusaakina?si=yH3v2crwFc9VFgLl" target="_blank">
    <img class="sns-icon" src="images/youtube.svg" alt="YouTube">
  </a>

  <a href="https://x.com/333akina" target="_blank">
    <img class="sns-icon" src="images/x.svg" alt="X">
  </a>

  <div class="btn gray">コンテンツ</div>

</div>
  </div>
</div>

</div>

</div>

</body>
</html>
