<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>推しリスト</title>

<style>
body {
  font-family: sans-serif;
  background: #f4f5f7;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;

  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 16px;
}

h1 {
  text-align: center;
  font-size: 26px;
  margin-top: 20px;
}

/* カード */
.card {
  display: flex;
  align-items: flex-start;
  background: white;
  padding: 20px;
  margin: 0;
  border-radius: 16px;
  text-decoration: none;
  color: black;
  box-shadow: 0 6px 16px rgba(0,0,0,0.08);
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* 左ライン */
.line {
  width: 6px;
  height: 100%;
  position: absolute;
  left: 0;
  top: 0;
}

.blue { background: linear-gradient(180deg,#4DD7E3,#2bb3c4); }
.red { background: linear-gradient(180deg,#F03C31,#c81e1e); }

/* アイコン */
.card img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  margin-right: 16px;
  object-fit: cover;
  transition: transform 0.2s ease;
}

.card:hover img {
  transform: scale(1.05);
}

/* 右側 */
.content {
  display: flex;
  flex-direction: column;
  flex: 1;
}

.name {
  font-weight: bold;
  font-size: 16px;
}

.desc {
  font-size: 12px;
  color: #666;
  margin-top: 4px;
}

/* ボタン */
.links {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  padding: 6px 10px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 12px;
  color: white;
  display: inline-block;
  transition: transform 0.1s ease, filter 0.2s ease;
}

.btn:hover {
  filter: brightness(1.1);
}

.btn:active {
  transform: scale(0.95);
}

.yt { background: #FF0000; }
.x { background: #000; }

/* ★コンテンツ（修正版） */
.gray {
  background: #9a9a9a !important;
  color: white;
}
</style>

</head>

<body>

<div class="container">

<h1>推しリスト</h1>

<!-- 甲斐田 -->
<div class="card">

  <div class="line blue"></div>

  <img src="kaida.png">

  <div class="content">

    <div class="name">甲斐田 晴</div>
    <div class="desc">歌・雑談・ゲーム配信</div>

    <div class="links">
      <a class="btn yt" href="https://www.youtube.com/" target="_blank">YouTube</a>
      <a class="btn x" href="https://x.com" target="_blank">X</a>
      <div class="btn gray">コンテンツ</div>
    </div>

  </div>

</div>

<!-- 明那 -->
<div class="card">

  <div class="line red"></div>

  <img src="akina.png">

  <div class="content">

    <div class="name">三枝 明那</div>
    <div class="desc">歌・雑談・ゲーム配信</div>

    <div class="links">
      <a class="btn yt" href="https://www.youtube.com/@saegusaakina" target="_blank">YouTube</a>
      <a class="btn x" href="https://x.com" target="_blank">X</a>
      <div class="btn gray">コンテンツ</div>
    </div>

  </div>

</div>

</div>

</body>
</html>
