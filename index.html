<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>推しポータル</title>

<style>
body {
  font-family: sans-serif;
  background: #f4f5f7;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}

h1 {
  text-align: center;
  font-size: 26px;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

<h1>推しポータル</h1>
<!-- カードエリア -->

<a href="#" style="
  display:flex;
  align-items:center;
  background:white;
  padding:14px;
  margin:10px 0;
  border-radius:14px;
  text-decoration:none;
  color:black;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  position:relative;
  overflow:hidden;
">

  <!-- 左ライン -->
  <div style="
    width:6px;
    height:100%;
    position:absolute;
    left:0;
    top:0;
    background:linear-gradient(180deg,#4DD7E3,#2bb3c4);
  "></div>

  <img src="https://placehold.co/80x80" style="
    width:64px;
    height:64px;
    border-radius:50%;
    margin-right:12px;
  ">

  <div>
    <div style="font-weight:bold;">甲斐田 晴</div>
    <div style="font-size:12px;color:#666;">歌・雑談・ゲーム配信</div>
  </div>

</a>


<a href="#" style="
  display:flex;
  align-items:center;
  background:white;
  padding:14px;
  margin:10px 0;
  border-radius:14px;
  text-decoration:none;
  color:black;

">

  <div style="

    height:100%;

    left:0;

    background:linear-gradient(180deg,#F03C31,#c81e1e);
  "></div>

  <img src="https://placehold.co/80x80" style="
    width:64px;
    height:64px;
    border-radius:50%;
    margin-right:12px;
  ">

  <div>
    <div style="font-weight:bold;">三枝 明那</div>
    <div style="font-size:12px;color:#666;">歌枠・ライブ・雑談</div>
  </div>

</a>
</div>

</body>
</html>
