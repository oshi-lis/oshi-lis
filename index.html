<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>推しリスト</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f7fb;
  margin: 0;
  padding: 0;
  color: #222;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 20px;
}

h1 {
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  margin: 20px 0 30px;
  letter-spacing: 1px;
}

/* カード一覧 */
.list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 16px;
}

/* カード */
.card {
  display: flex;
  align-items: flex-start;
  background: #ffffff;
  padding: 20px;
  margin: 0;
  border-radius: 18px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.05);

  transition: transform 0.2s ease, box-shadow 0.2s ease;
  width: 100%;
  box-sizing: border-box;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

/* 左ライン */
.line {
  width: 6px;
  height: 100%;
  position: absolute;
  left: 0;
  top: 0;
}

.blue { background: linear-gradient(180deg,#4DD7E3,#2bb3c4); }
.red { background: linear-gradient(180deg,#F03C31,#c81e1e); }

/* アイコン */
.card img {
  width: 72px;
  height: 72px;
  border-radius: 16px;
  object-fit: cover;
  margin-right: 16px;

  border: 2px solid rgba(0,0,0,0.08);
}

/* 右側 */
.content {
  display: flex;
  flex-direction: column;
  flex: 1;
}

.name {
  font-weight: bold;
  font-size: 16px;
  color: #222;
  text-decoration: none;
}

.name:hover {
  color: #4DD7E3;
  cursor: pointer;
}
.desc {
  font-size: 12px;
  color: #666;
  margin-top: 4px;
}

/* ボタン */
.links {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 12px;
  color: white;
  display: inline-block;
  text-decoration: none;
  transition: transform 0.1s ease, filter 0.2s ease;
}

.btn:hover {
  filter: brightness(1.1);
}

.btn:active {
  transform: scale(0.95);
}

.yt { background: #FF0000; }
.x { background: #000; }

.gray {
  background: #9a9a9a !important;
  color: white;
}
</style>

</head>

<body>

<div class="container">

<h1>推しリスト</h1>

<div class="list">

<!-- 甲斐田 -->
<div class="card">
  <div class="line blue"></div>

  <img src="kaida.png">

  <div class="content">
    <a class="name" href="kaida.html">甲斐田 晴</a>
    <div class="desc">歌・雑談・ゲーム配信</div>

    <div class="links">
      <a class="btn yt" href="https://www.youtube.com/" target="_blank">YouTube</a>
      <a class="btn x" href="https://x.com" target="_blank">X</a>
      <div class="btn gray">コンテンツ</div>
    </div>
  </div>
</div>

<!-- 明那 -->
<div class="card">
  <div class="line red"></div>

  <img src="akina.png">

  <div class="content">
    <a class="name" href="akina.html">三枝 明那</a>
    <div class="desc">歌・雑談・ゲーム配信</div>

    <div class="links">
      <a class="btn yt" href="https://www.youtube.com/@saegusaakina" target="_blank">YouTube</a>
      <a class="btn x" href="https://x.com" target="_blank">X</a>
      <div class="btn gray">コンテンツ</div>
    </div>
  </div>
</div>

</div>

</div>

</body>
</html>
